<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>PNG - 출사 계획</title>
  <link rel="stylesheet" href="../common/fonts.css">
  <link rel="stylesheet" href="../common/common.css">
    <style>
.phone-frame {
        width: 100%;
        height: 100dvh;
        background: var(--color-bg);
        position: relative;
        overflow: hidden;
      }
      .phone-scroll {
        height: 100%;
        overflow-y: auto;
        overflow-x: hidden;
        padding-bottom: 80px;
      }

      /* ── 헤더 (travel-plan과 동일 구조) ── */
      /* ── 상태바 ── */
      .status-bar {
        position: sticky;
        top: 0;
        z-index: 200;
        height: 54px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 34px;
        background: #fff;
      }
      .status-bar__time {
        font-size: var(--font-md);
        font-weight: 600;
        color: #000;
        letter-spacing: -0.3px;
      }
      .dynamic-island {
        position: absolute;
        top: 8px;
        left: 50%;
        transform: translateX(-50%);
        width: 106px;
        height: 28px;
        background: #000;
        border-radius: 14px;
      }
      .status-bar__icons {
        display: flex;
        gap: 6px;
      }
      .status-bar__icons svg {
        height: 12px;
        fill: #000;
      }

      /* ── Large Title 네비 ── */
      .page-nav {
        position: sticky;
        top: 54px;
        z-index: 100;
        background: #fff;
      }

      /* 컴팩트 행 — 항상 표시, 타이틀은 스크롤 시 페이드인 */
      .page-nav__compact {
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 var(--space-md);
      }
      .page-nav__compact-title {
        font-size: var(--font-lg);
        font-weight: 600;
        letter-spacing: -0.4px;
        opacity: 0;
        transition: opacity 0.2s;
      }
      .page-nav.is-scrolled .page-nav__compact-title { opacity: 1; }

      /* 큰 타이틀 행 — 스크롤 시 접힘 */
      .page-nav__large {
        padding: 2px 16px 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        overflow: hidden;
        max-height: 60px;
        transition: max-height 0.25s ease, padding 0.25s ease, opacity 0.2s;
        opacity: 1;
      }
      .page-nav.is-scrolled .page-nav__large {
        max-height: 0;
        padding-top: 0;
        padding-bottom: 0;
        opacity: 0;
      }
      .page-nav__large-title {
        font-size: var(--font-2xl);
        font-weight: 600;
        letter-spacing: -0.6px;
      }

      .page-nav__compose {
        width: 32px; height: 32px; border: none; background: none;
        display: flex; align-items: center; justify-content: center;
        color: var(--color-accent); cursor: pointer; flex-shrink: 0;
        margin-left: auto; transition: opacity 0.15s;
      }
      .page-nav__compose:hover { opacity: 0.7; }

      /* ── 섹션 탭 ── */
      .section-tabs {
        display: flex;
        gap: 8px;
        padding: 10px 16px 12px;
        border-bottom: 0.5px solid rgba(0,0,0,0.08);
      }
      .section-tab {
        display: flex;
        align-items: center;
        gap: 5px;
        height: 32px;
        padding: 0 14px;
        border-radius: 16px;
        border: none;
        background: var(--color-surface);
        font-family: var(--font-family);
        font-size: var(--font-sm);
        font-weight: 500;
        color: rgba(0,0,0,0.45);
        cursor: pointer;
        transition: all 0.18s;
      }
      .section-tab.is-active {
        background: var(--color-accent);
        color: #fff;
      }
      .section-tab__count {
        font-size: var(--font-xs);
        font-weight: 600;
        opacity: 0.75;
      }
      .section-tab.is-active .section-tab__count { opacity: 1; }

      /* ── 컨텐츠 ── */
      .content {
        position: relative;
        z-index: 1;
        padding: 20px 20px 0;
      }
      .section.is-hidden { display: none; }

      /* ── 섹션 헤더 ── */
      .section-header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        margin-bottom: 10px;
      }
      .section-header__title {
        font-size: var(--font-sm);
        font-weight: 600;
        color: rgba(0, 0, 0, 0.3);
        letter-spacing: 0.3px;
      }
      .section-header__count {
        font-size: var(--font-sm);
        color: rgba(0, 0, 0, 0.3);
      }

      /* ── 출사 계획 카드 ── */
      .plan-card {
        border-radius: var(--radius-card);
        background: var(--color-bg);
        border: 0.5px solid rgba(0, 0, 0, 0.07);
        overflow: hidden;
        cursor: pointer;
        transition: transform 0.15s;
        margin-bottom: 12px;
      }
      .plan-card:active {
        transform: scale(0.98);
      }
      .plan-card__thumb {
        height: 120px;
        position: relative;
        overflow: hidden;
        display: flex;
      }
      /*
       * [썸네일 자동 생성 — 개발 참고]
       * 사용자가 사진을 직접 업로드하지 않습니다.
       * 출사 계획에 추가된 스팟의 대표 사진(thumbnail_url)을
       * 앞에서 최대 3장 자동으로 가져와 표시합니다.
       *
       * 렌더링 로직 예시:
       *   const thumbnails = plan.spots.slice(0, 3).map(s => s.thumbnail_url)
       *
       * - 첫 번째 이미지: flex: 2 (더 넓게 표시)
       * - 나머지 이미지: flex: 1
       * - 스팟이 없을 때: 그레이 플레이스홀더 표시
       */
      .plan-card__thumb-img {
        flex: 1;
        background-size: cover;
        background-position: center;
      }
      .plan-card__thumb-img:first-child {
        flex: 2;
      }
      .plan-card__status {
        position: absolute;
        top: 10px;
        left: 10px;
        height: 22px;
        padding: 0 10px;
        border-radius: 11px;
        font-size: var(--font-2xs);
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .plan-card__status--active {
        background: rgba(52, 199, 89, 0.9);
        color: #fff;
      }
      .plan-card__status--upcoming {
        background: rgba(0, 0, 0, 0.35);
        color: #fff;
      }
      .plan-card__status--done {
        background: rgba(0, 0, 0, 0.2);
        color: #fff;
      }
      .plan-card__spot-count {
        position: absolute;
        bottom: 10px;
        right: 10px;
        height: 22px;
        padding: 0 10px;
        border-radius: 11px;
        background: rgba(0, 0, 0, 0.35);
        font-size: var(--font-2xs);
        font-weight: 500;
        color: #fff;
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .plan-card__body {
        padding: 12px 14px 14px;
      }
      .plan-card__top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        margin-bottom: 4px;
      }
      .plan-card__name {
        font-size: var(--font-lg);
        font-weight: 600;
        color: var(--color-text-primary);
        letter-spacing: -0.3px;
      }
      .plan-card__arrow {
        color: rgba(0, 0, 0, 0.18);
        flex-shrink: 0;
        margin-top: 2px;
      }
      .plan-card__date {
        font-size: 12px;
        color: rgba(0, 0, 0, 0.38);
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .plan-card__stats {
        display: flex;
        gap: 12px;
      }
      .plan-card__stat {
        display: flex;
        align-items: center;
        gap: 4px;
        font-size: 12px;
        color: rgba(0, 0, 0, 0.4);
      }
      .plan-card__stat svg {
        flex-shrink: 0;
      }
      .plan-card__progress {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 14px;
        background: rgba(52, 199, 89, 0.05);
        border-top: 0.5px solid rgba(52, 199, 89, 0.12);
      }
      .plan-card__progress-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--color-success);
        flex-shrink: 0;
      }
      .plan-card__progress-text {
        font-size: 12px;
        color: var(--color-success);
        font-weight: 500;
      }

      /* ── 새 계획 만들기 카드 ── */
      .new-plan-card {
        border-radius: var(--radius-card);
        border: 1.5px dashed rgba(0, 0, 0, 0.1);
        height: 72px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        cursor: pointer;
        transition: all 0.2s;
        margin-bottom: 12px;
      }
      .new-plan-card:hover {
        border-color: var(--color-accent);
        background: rgba(227, 27, 89, 0.02);
      }
      .new-plan-card__icon {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        background: var(--color-surface);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.2s;
      }
      .new-plan-card:hover .new-plan-card__icon {
        background: rgba(227, 27, 89, 0.08);
      }
      .new-plan-card__label {
        font-size: var(--font-md);
        font-weight: 500;
        color: rgba(0, 0, 0, 0.3);
        transition: color 0.2s;
      }
      .new-plan-card:hover .new-plan-card__label {
        color: var(--color-accent);
      }

      /* ── 섹션 구분 ── */
      .section {
        margin-top: var(--space-lg);
      }

      /* ── 탭바 ── */
      .tab-bar {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 80px;
        background: #fff;
        border-top: 0.5px solid rgba(0, 0, 0, 0.08);
        display: flex;
        align-items: flex-start;
        justify-content: space-around;
        padding-top: 8px;
        z-index: 50;
      }
      /* .tab / .tab__icon / .tab__label / .tab-bar__indicator → common.css */
    
    </style>
  </head>
  <body>
    <div class="phone-frame">
      <div class="phone-scroll">
      <!-- 상태바 -->
      <div class="status-bar">
        <span class="status-bar__time">9:41</span>

        <div class="status-bar__icons">
          <svg viewBox="0 0 18 12">

      <div class="page-nav" id="page-nav">

          <button class="page-nav__compose" aria-label="새 계획" onclick="location.href='./travel-new.html'">

  <script>
    // 스크롤 → 컴팩트 타이틀 전환
    const frame = document.querySelector('.phone-scroll');
    const nav = document.getElementById('page-nav');
    frame.addEventListener('scroll', () => {
      nav.classList.toggle('is-scrolled', frame.scrollTop > 44);
    });

    // 섹션 탭 전환
    const tabs = document.querySelectorAll('.section-tab');
    const sections = document.querySelectorAll('.content .section');
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('is-active'));
        tab.classList.add('is-active');
        const target = tab.dataset.target;
        sections.forEach(s => {
          s.classList.toggle('is-hidden', target !== 'all' && s.id !== target);
        });
        frame.scrollTop = 0;
      });
    });
  </script>
