<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PNG - 지도</title>
  <link rel="stylesheet" href="../fonts.css">
  <style>
    :root {
      --color-bg: #ffffff;
      --color-surface: #f5f5f7;
      --color-text-primary: #000000;
      --color-accent: #e31b59;
      --color-accent-hover: #c91550;
      --color-border-light: rgba(0,0,0,0.06);
      --color-error: #ff453a;
      --color-success: #34c759;
      --color-warning: #ff9f0a;
      --radius-card: 16px;
      --radius-pill: 17px;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html{font-size:16px;-webkit-font-smoothing:antialiased}
    body{font-family:var(--font-family);background:#f0f0f0;display:flex;justify-content:center;min-height:100dvh}
    .phone-frame{width:390px;background:#e8e8ed;position:relative;overflow:hidden;height:100dvh;display:flex;flex-direction:column}

    /* ── 상태바 (투명 오버레이) ── */
    .map-status-bar{position:absolute;top:0;left:0;right:0;z-index:25;height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 34px;pointer-events:none}
    .map-status-bar__time{font-size:15px;font-weight:600;color:#000;letter-spacing:-0.2px}
    .map-status-bar__dynamic-island{position:absolute;top:8px;left:50%;transform:translateX(-50%);width:106px;height:28px;background:#000;border-radius:14px}
    .map-status-bar__icons{display:flex;align-items:center;gap:6px}

    /* ── 상단 오버레이 ── */
    .map-header{position:absolute;top:0;left:0;right:0;z-index:20;padding:54px 16px 0}
    .map-search{display:flex;align-items:center;gap:8px}
    .map-search__back{width:40px;height:40px;border-radius:50%;background:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
    /* 플랜 모드 배너 */
    .plan-mode-banner{display:none;align-items:center;gap:8px;background:rgba(227,27,89,0.92);border-radius:12px;padding:8px 14px;margin-top:10px;backdrop-filter:blur(8px)}
    .plan-mode-banner.is-visible{display:flex}
    .plan-mode-banner__text{font-size:13px;font-weight:500;color:#fff;letter-spacing:-0.15px;flex:1}
    .map-search__bar{flex:1;height:40px;border-radius:20px;background:#fff;display:flex;align-items:center;padding:0 14px;gap:8px;box-shadow:0 2px 8px rgba(0,0,0,0.1);cursor:text}
    .map-search__bar span{font-size:14px;color:rgba(0,0,0,0.35);letter-spacing:-0.15px}

    /* 카테고리 칩 */
    .map-filters{display:flex;gap:6px;padding:10px 0 0;overflow-x:auto;scrollbar-width:none}
    .map-filters::-webkit-scrollbar{display:none}
    .map-filter{flex-shrink:0;height:32px;padding:0 14px;border-radius:16px;border:none;background:#fff;font-family:var(--font-family);font-size:12px;font-weight:500;color:rgba(0,0,0,0.55);cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,0.08);transition:all 0.18s}
    .map-filter.is-active{background:var(--color-text-primary);color:#fff}

    /* ── 지도 영역 ── */
    .map-canvas{position:absolute;inset:0;background:#e8e8ed}
    .map-canvas__grid{position:absolute;inset:0}
    .map-canvas__grid line{stroke:rgba(0,0,0,0.04);stroke-width:0.5}
    .map-canvas__road{position:absolute;inset:0}
    .map-canvas__road path{fill:none;stroke:rgba(255,255,255,0.9);stroke-linecap:round}
    .map-canvas__road path.road-main{stroke-width:8}
    .map-canvas__road path.road-sub{stroke-width:4;stroke:rgba(255,255,255,0.7)}
    .map-canvas__block{position:absolute;border-radius:4px;background:rgba(0,0,0,0.06)}

    /* 마커 */
    .map-pin{position:absolute;transform:translate(-50%,-100%);cursor:pointer;transition:transform 0.15s;z-index:5}
    .map-pin:active{transform:translate(-50%,-100%) scale(0.9)}
    .map-pin.is-active{z-index:6}
    .map-pin.is-active svg path:first-child{filter:drop-shadow(0 3px 6px rgba(227,27,89,0.4))}
    .map-pin__touch{position:absolute;inset:-10px;border-radius:50%}

    /* 현재 위치 */
    .map-me{position:absolute;transform:translate(-50%,-50%);z-index:4}
    .map-me__pulse{width:44px;height:44px;border-radius:50%;background:rgba(0,113,227,0.1);display:flex;align-items:center;justify-content:center;animation:pulse 2s infinite}
    .map-me__ring{width:24px;height:24px;border-radius:50%;background:rgba(0,113,227,0.15);display:flex;align-items:center;justify-content:center}
    .map-me__dot{width:12px;height:12px;border-radius:50%;background:var(--color-accent);border:2.5px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.2)}
    @keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.3);opacity:0.6}}

    /* 지도 컨트롤 */
    .map-controls{position:absolute;right:16px;top:160px;z-index:10;display:flex;flex-direction:column;gap:8px}
    .map-ctrl-group{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
    .map-ctrl{width:40px;height:40px;border:none;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;color:rgba(0,0,0,0.45);transition:background 0.15s}
    .map-ctrl:hover{background:var(--color-surface)}
    .map-ctrl-divider{height:0.5px;background:rgba(0,0,0,0.06)}

    /* 스팟 등록 FAB */
    .map-fab{position:absolute;right:16px;bottom:100px;z-index:10;width:52px;height:52px;border-radius:50%;background:var(--color-accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(227,27,89,0.35);transition:all 0.2s}
    .map-fab:hover{background:var(--color-accent-hover);transform:scale(1.05)}
    .map-fab:active{transform:scale(0.95)}
    .map-fab__tooltip{position:absolute;right:60px;top:50%;transform:translateY(-50%);height:32px;padding:0 12px;border-radius:16px;background:rgba(0,0,0,0.65);font-size:12px;font-weight:500;color:#fff;display:none;align-items:center;white-space:nowrap}
    .map-fab:hover .map-fab__tooltip{display:flex}

    /* ── 위치 선택 모드 ── */
    .select-overlay{position:absolute;inset:0;z-index:15;display:none}
    .select-overlay.is-active{display:block}
    .select-overlay__dim{position:absolute;inset:0;background:rgba(0,0,0,0.2)}
    .select-overlay__hint{position:absolute;top:160px;left:50%;transform:translateX(-50%);height:36px;padding:0 16px;border-radius:18px;background:rgba(0,0,0,0.65);display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;color:#fff;white-space:nowrap}
    .select-overlay__cancel{position:absolute;top:160px;right:16px;height:36px;padding:0 16px;border-radius:18px;background:#fff;border:none;font-family:var(--font-family);font-size:13px;font-weight:500;color:rgba(0,0,0,0.55);cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
    .select-overlay__crosshair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
    .select-pin{position:absolute;top:50%;left:50%;transform:translate(-50%,-100%) translateY(-8px);pointer-events:none;transition:top 0.1s,left 0.1s}
    .select-pin__shadow{width:16px;height:6px;border-radius:50%;background:rgba(0,0,0,0.2);position:absolute;bottom:-3px;left:50%;transform:translateX(-50%)}

    /* 위치 확정 바텀 버튼 */
    .select-cta{position:absolute;bottom:96px;left:16px;right:16px;height:48px;border-radius:24px;background:var(--color-accent);border:none;font-family:var(--font-family);font-size:15px;font-weight:500;color:#fff;cursor:pointer;z-index:16;display:none;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 14px rgba(227,27,89,0.3);transition:background 0.2s}
    .select-cta.is-active{display:flex}
    .select-cta:hover{background:var(--color-accent-hover)}

    /* ── 마커 팝업 카드 ── */
    .spot-popup{position:absolute;bottom:92px;left:16px;right:16px;z-index:12;background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.16);transform:translateY(120%);transition:transform 0.3s cubic-bezier(0.32,0.72,0,1);pointer-events:none}
    .spot-popup.is-visible{transform:translateY(0);pointer-events:auto}

    /* 사진 섬네일 트랙 */
    .spot-popup__photos{display:flex;gap:2px;height:110px;overflow:hidden}
    .spot-popup__photo{flex:1;min-width:0}
    .spot-popup__photo:first-child{border-radius:0}
    .spot-popup__score{position:absolute;top:10px;right:10px;height:24px;padding:0 10px;border-radius:12px;background:rgba(0,0,0,0.45);display:flex;align-items:center;gap:4px;font-size:12px;font-weight:600;color:#fff}
    .spot-popup__close{position:absolute;top:10px;left:10px;width:26px;height:26px;border-radius:50%;background:rgba(0,0,0,0.35);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center}

    .spot-popup__body{padding:14px 16px 16px}
    .spot-popup__top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px}
    .spot-popup__name{font-size:17px;font-weight:600;color:#000;letter-spacing:-0.3px}
    .spot-popup__rating{font-size:12px;color:var(--color-warning);margin-bottom:8px}
    .spot-popup__rating span{color:rgba(0,0,0,0.35);margin-left:3px;font-size:11px}
    .spot-popup__loc{font-size:12px;color:rgba(0,0,0,0.4);margin-bottom:10px;display:flex;align-items:center;gap:4px}
    .spot-popup__tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
    .spot-popup__tag{height:22px;padding:0 9px;border-radius:11px;background:var(--color-surface);font-size:11px;color:rgba(0,0,0,0.45);display:flex;align-items:center}
    .spot-popup__actions{display:flex;gap:8px}
    .spot-popup__btn{flex:1;height:42px;border-radius:21px;border:none;font-family:var(--font-family);font-size:14px;font-weight:500;cursor:pointer;transition:all 0.18s;display:flex;align-items:center;justify-content:center;gap:6px}
    .spot-popup__btn--secondary{background:var(--color-surface);color:rgba(0,0,0,0.6)}
    .spot-popup__btn--secondary:hover{background:rgba(0,0,0,0.07)}
    .spot-popup__btn--primary{background:var(--color-accent);color:#fff}
    .spot-popup__btn--primary:hover{background:var(--color-accent-hover)}

    /* ── 탭바 ── */
    .tab-bar{position:absolute;bottom:0;left:0;right:0;height:80px;background:#fff;border-top:0.5px solid rgba(0,0,0,0.08);display:flex;align-items:flex-start;justify-content:space-around;padding-top:8px;z-index:20}
    .tab{display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;cursor:pointer;padding:4px 10px;transition:opacity 0.15s}
    .tab:hover{opacity:0.7}
    .tab__icon{width:22px;height:22px;color:rgba(0,0,0,0.35)}
    .tab__label{font-size:10px;color:rgba(0,0,0,0.35);font-family:var(--font-family)}
    .tab.is-active .tab__icon{color:var(--color-accent)}
    .tab.is-active .tab__label{color:var(--color-accent);font-weight:500}
    .tab-bar__indicator{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:110px;height:5px;background:rgba(0,0,0,0.1);border-radius:2.5px}

    @media(max-width:390px){.phone-frame{width:100%}}
    @media(min-width:391px){body{padding:20px 0}.phone-frame{border-radius:40px;box-shadow:0 20px 60px rgba(0,0,0,0.15);height:calc(100dvh - 40px)}.tab-bar{border-radius:0 0 40px 40px}}
  
      /* ── 스크롤바 숨김 ── */
      * { scrollbar-width: none; -ms-overflow-style: none; }
      *::-webkit-scrollbar { display: none; }

      /* ── 경로 확인 모드 ── */
      .view-header { display: none; align-items: center; gap: 10px; padding: 8px 0 0; }
      .view-header.is-visible { display: flex; }
      .view-header__title { font-size: 16px; font-weight: 600; color: #000; letter-spacing: -0.3px; flex: 1; }
      .view-day-btns { display: flex; gap: 6px; }
      .view-day-btn { height: 28px; padding: 0 12px; border-radius: 14px; border: none; font-family: var(--font-family); font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.18s; color: #fff; opacity: 0.45; }
      .view-day-btn.is-active { opacity: 1; }

      /* 번호 핀 (경로 확인 모드) */
      .view-pin { position: absolute; transform: translate(-50%, -50%); z-index: 8; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.25); border: 2.5px solid #fff; transition: transform 0.2s; cursor: default; }

      /* 경로 SVG */
      .view-route-svg { position: absolute; inset: 0; pointer-events: none; z-index: 6; }
</style>
</head>
<body>
<div class="phone-frame">

  <!-- ── 상태바 ── -->
  <div class="map-status-bar">
    <span class="map-status-bar__time">9:41</span>

      <svg height="12" viewBox="0 0 18 12" fill="#000"><rect x="0" y="9" width="3" height="3" rx=".75"/><rect x="4.5" y="6" width="3" height="6" rx=".75"/><rect x="9" y="3" width="3" height="9" rx=".75"/><rect x="13.5" y="0" width="3" height="12" rx=".75"/></svg>
      <svg height="12" viewBox="0 0 28 14"><rect x="0" y="0" width="25" height="12" rx="3.5" fill="none" stroke="rgba(0,0,0,.3)" stroke-width="1"/><rect x="1.5" y="1.5" width="20" height="9" rx="2" fill="#34c759"/></svg>

  </div>

  <!-- 마커들 -->
  <div class="map-pin" id="pin-gwanganri" style="left:22%;top:28%" onclick="showPopup('gwanganri')">
    <div class="map-pin__touch"></div>
    <svg width="32" height="40" viewBox="0 0 28 34" fill="none" filter="drop-shadow(0 2px 4px rgba(0,0,0,0.2))"><path d="M14 0C6.3 0 0 6.3 0 14C0 23 14 34 14 34S28 23 28 14C28 6.3 21.7 0 14 0Z" fill="#E31B59"/><circle cx="14" cy="12" r="5.5" fill="#fff"/></svg>

  </div>

    <svg width="28" height="35" viewBox="0 0 24 30" fill="none" filter="drop-shadow(0 2px 4px rgba(0,0,0,0.2))"><path d="M12 0C5.4 0 0 5.4 0 12C0 20 12 30 12 30S24 20 24 12C24 5.4 18.6 0 12 0Z" fill="#E31B59"/><circle cx="12" cy="10.5" r="4.5" fill="#fff"/></svg>
  </div>

  <!-- 경로 확인 모드: 루트 SVG + 핀 컨테이너 -->
  <svg class="view-route-svg" id="viewRouteSvg" width="100%" height="100%"></svg>
  <div id="viewPinsContainer"></div>

  <!-- 현재 위치 -->
  <div class="map-me" style="left:45%;top:48%">
    <div class="map-me__pulse">
      <div class="map-me__ring"><div class="map-me__dot"></div></div>
    </div>
  </div>

  <!-- 상단 검색/필터 -->
  <div class="map-header">
    <div class="map-search">
      <button class="map-search__back" id="mapBackBtn" aria-label="뒤로가기">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="rgba(0,0,0,0.5)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="11,3 5,9 11,15"/></svg>
      </button>
      <div class="map-search__bar" id="mapSearchBar">
        <svg width="15" height="15" viewBox="0 0 18 18" fill="none" stroke="rgba(0,0,0,0.3)" stroke-width="1.5" stroke-linecap="round"><circle cx="8" cy="8" r="6.5"/><line x1="13" y1="13" x2="16.5" y2="16.5"/></svg>
        <span>장소, 테마, 키워드 검색</span>
      </div>
    </div>
    <!-- 플랜 모드 배너 -->
    <div class="plan-mode-banner" id="planBanner">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round"><circle cx="7" cy="7" r="6"/><line x1="7" y1="4.5" x2="7" y2="7.5"/><circle cx="7" cy="9.5" r="0.6" fill="#fff" stroke="none"/></svg>
      <span class="plan-mode-banner__text">추가할 스팟을 지도에서 선택하세요</span>
    </div>
    <!-- 경로 확인 모드 헤더 -->
    <div class="view-header" id="viewHeader">
      <div class="view-header__title" id="viewTitle">DAY 1 경로</div>
      <div class="view-day-btns" id="viewDayBtns"></div>
    </div>
    <div class="map-filters" id="mapFilters">
      <button class="map-filter is-active" onclick="filterMap(this)">전체</button>
      <button class="map-filter" onclick="filterMap(this)">야경</button>
      <button class="map-filter" onclick="filterMap(this)">바다</button>
      <button class="map-filter" onclick="filterMap(this)">한옥</button>
      <button class="map-filter" onclick="filterMap(this)">꽃</button>
      <button class="map-filter" onclick="filterMap(this)">카페</button>
      <button class="map-filter" onclick="filterMap(this)">숲</button>
      <button class="map-filter" onclick="filterMap(this)">축제</button>
    </div>
  </div>

  <!-- 지도 컨트롤 -->
  <div class="map-controls">
    <div class="map-ctrl-group">
      <button class="map-ctrl">+</button>
      <div class="map-ctrl-divider"></div>
      <button class="map-ctrl">−</button>
    </div>
    <div class="map-ctrl-group">
      <button class="map-ctrl" aria-label="내 위치">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="rgba(0,0,0,.45)" stroke-width="1.3" stroke-linecap="round">
          <circle cx="8" cy="8" r="4"/><line x1="8" y1="1" x2="8" y2="4"/><line x1="8" y1="12" x2="8" y2="15"/><line x1="1" y1="8" x2="4" y2="8"/><line x1="12" y1="8" x2="15" y2="8"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- 스팟 등록 FAB -->
  <button class="map-fab" onclick="enterSelectMode()" aria-label="포토스팟 등록">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round">
      <line x1="10" y1="3" x2="10" y2="17"/><line x1="3" y1="10" x2="17" y2="10"/>
    </svg>
    <div class="map-fab__tooltip">포토스팟 등록</div>
  </button>

  <!-- 위치 선택 모드 -->
  <div class="select-overlay" id="selectOverlay">
    <div class="select-overlay__dim" onclick="handleMapTap(event)"></div>
    <div class="select-overlay__hint">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="#fff" stroke-width="1.3" stroke-linecap="round"><path d="M7 1C4.2 1 2 3.2 2 6C2 9.5 7 13 7 13S12 9.5 12 6C12 3.2 9.8 1 7 1Z"/><circle cx="7" cy="6" r="2"/></svg>
      등록할 위치를 탭해주세요
    </div>
    <button class="select-overlay__cancel" onclick="exitSelectMode()">취소</button>
    <!-- 드롭 핀 -->
    <div class="select-pin" id="selectPin" style="display:none">
      <svg width="32" height="40" viewBox="0 0 28 34" fill="none"><path d="M14 0C6.3 0 0 6.3 0 14C0 23 14 34 14 34S28 23 28 14C28 6.3 21.7 0 14 0Z" fill="#E31B59"/><circle cx="14" cy="12" r="5" fill="#fff"/></svg>
      <div class="select-pin__shadow"></div>
    </div>
  </div>
  <button class="select-cta" id="selectCta" onclick="goRegister()">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="9" r="7.5"/><polyline points="5.5,9 8,11.5 12.5,6.5"/></svg>
    이 위치로 스팟 등록하기
  </button>

  <!-- 마커 팝업 카드 -->
  <div class="spot-popup" id="spotPopup">
    <div style="position:relative">
      <div class="spot-popup__photos" id="popupPhotos"></div>
      <div class="spot-popup__score" id="popupScore"></div>
      <button class="spot-popup__close" onclick="closePopup()" aria-label="닫기">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round"><line x1="1" y1="1" x2="9" y2="9"/><line x1="9" y1="1" x2="1" y2="9"/></svg>
      </button>
    </div>
    <div class="spot-popup__body">
      <div class="spot-popup__top">
        <div>
          <div class="spot-popup__name" id="popupName"></div>
          <div class="spot-popup__rating" id="popupRating"></div>
        </div>
      </div>
      <div class="spot-popup__loc" id="popupLoc">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="rgba(0,0,0,0.35)" stroke-width="1"><path d="M6 1C3.5 1 1.5 3 1.5 5.5C1.5 8.5 6 12 6 12S10.5 8.5 10.5 5.5C10.5 3 8.5 1 6 1Z"/><circle cx="6" cy="5" r="1.5"/></svg>
        <span id="popupLocText"></span>
      </div>
      <div class="spot-popup__tags" id="popupTags"></div>
      <div class="spot-popup__actions" id="popupActions">
        <!-- 버튼은 JS에서 모드에 따라 렌더링 -->
      </div>
    </div>
  </div>

  <!-- 탭바 -->
  <div class="tab-bar">
    <button class="tab" onclick="location.href='./home.html'">
      <svg class="tab__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l-2 0l9 -9l9 9l-2 0"/><path d="M5 12v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2 -2v-7"/><path d="M9 21v-6a2 2 0 0 1 2 -2h2a2 2 0 0 1 2 2v6"/></svg>
      <span class="tab__label">홈</span>
    </button>
    <button class="tab is-active">
      <svg class="tab__icon" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"><path d="M2 5L8 3L14 7L20 5V17L14 19L8 15L2 17Z"/></svg>
      <span class="tab__label">지도</span>
    </button>
    <button class="tab" onclick="location.href='../travel/travel-list.html'">
      <svg class="tab__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="19" r="2"/><circle cx="18" cy="5" r="2"/><path d="M12 19h4.5a3.5 3.5 0 0 0 0 -7h-8a3.5 3.5 0 0 1 0 -7h3.5"/></svg>
      <span class="tab__label">출사</span>
    </button>
    <button class="tab" onclick="location.href='../community/community-feed.html'">
      <svg class="tab__icon" viewBox="2 3 20 19" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 4a3 3 0 0 1 3 3v8a3 3 0 0 1 -3 3h-5l-5 3v-3h-2a3 3 0 0 1 -3 -3v-8a3 3 0 0 1 3 -3h12"/>
        <path d="M9.5 9h.01"/><path d="M14.5 9h.01"/>
        <path d="M9.5 13a3.5 3.5 0 0 0 5 0"/>
      </svg>
      <span class="tab__label">커뮤니티</span>
    </button>
    <button class="tab" onclick="location.href='../mypage/mypage.html'">
      <svg class="tab__icon" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><circle cx="11" cy="7" r="5"/><path d="M2 20Q5 13 11 13T20 20"/></svg>
      <span class="tab__label">MY</span>
    </button>
    <div class="tab-bar__indicator"></div>
  </div>

</div>
<script>
  const spotData = {
    gwanganri: {
      name: '광안리 해수욕장', loc: '부산 수영구 · 야경/바다',
      score: '87점', rating: '★★★★★', ratingNum: '4.8 · 리뷰 324건',
      tags: ['#야경', '#일출', '#바다', '#삼각대필수'],
      photos: ['linear-gradient(to bottom,#0f2027,#203a43,#2c5364)',
               'linear-gradient(to bottom,#2c5364,#4a7c8a,#8ab0be)',
               'linear-gradient(to bottom,#1a3a4a,#3a6a7a,#5a9aaa)']
    },
    gyeongbok: {
      name: '경복궁 야간개장', loc: '서울 종로구 · 야경/한옥',
      score: '91점', rating: '★★★★★', ratingNum: '4.9 · 리뷰 512건',
      tags: ['#야경', '#한옥', '#야간', '#인물'],
      photos: ['linear-gradient(to bottom,#232526,#414345,#8e7b5a)',
               'linear-gradient(to bottom,#1a1a1a,#5a4a3a,#8e7b5a)',
               'linear-gradient(to bottom,#2a2020,#6a5040,#9a8060)']
    },
    jeju: {
      name: '제주 사려니숲길', loc: '제주 서귀포시 · 숲/안개',
      score: '78점', rating: '★★★★☆', ratingNum: '4.7 · 리뷰 189건',
      tags: ['#숲', '#안개', '#새벽', '#광각'],
      photos: ['linear-gradient(to bottom,#1d4350,#4a8d7e,#a3d9c8)',
               'linear-gradient(to bottom,#0a2a1a,#3a7a5a,#6aaa8a)',
               'linear-gradient(to bottom,#1a3a2a,#5a8a6a,#8abaa0)']
    },
    everland: {
      name: '에버랜드 장미원', loc: '경기 용인시 · 꽃/정원',
      score: '92점', rating: '★★★★★', ratingNum: '4.8 · 리뷰 267건',
      tags: ['#장미', '#꽃', '#봄', '#매크로'],
      photos: ['linear-gradient(to bottom,#3a0a1a,#c05070,#f0a0b0)',
               'linear-gradient(to bottom,#4a0a2a,#d06080,#f5b0c0)',
               'linear-gradient(to bottom,#2a0010,#b04060,#e090a0)']
    },
    bukchon: {
      name: '북촌 한옥마을', loc: '서울 종로구 · 한옥/골목',
      score: '85점', rating: '★★★★★', ratingNum: '4.8 · 리뷰 398건',
      tags: ['#한옥', '#골목', '#새벽', '#인물'],
      photos: ['linear-gradient(to bottom,#2a1a0a,#8a6a3a,#c8a870)',
               'linear-gradient(to bottom,#1a1000,#7a5a2a,#b89860)',
               'linear-gradient(to bottom,#3a2010,#9a7a4a,#d8b880)']
    }
  };

  let activePin = null;
  // hash 기반 모드 감지: #plan  또는  #view/1
  const _hash = location.hash.replace('#', '');
  const isPlanMode = _hash === 'plan';
  const isViewMode = _hash.startsWith('view/');
  const viewDay = isViewMode ? (_hash.split('/')[1] || '1') : '1';

  // 경로 확인 모드 데이터
  // spots의 x/y % 숫자 = routePoints 좌표 (viewBox 0 0 100 100 기준으로 1:1 대응)
  const viewData = {
    '1': {
      color: '#f59e0b',
      label: 'DAY 1',
      spots: [
        { name: '광안리 해수욕장', x: '20%', y: '70%' },
        { name: '해동용궁사',     x: '58%', y: '24%' },
        { name: '감천문화마을',   x: '80%', y: '60%' }
      ],
      routePoints: '20,70 58,24 80,60'
    },
    '2': {
      color: '#3b82f6',
      label: 'DAY 2',
      spots: [
        { name: '흰여울문화마을', x: '28%', y: '50%' },
        { name: '태종대 유원지',  x: '72%', y: '35%' }
      ],
      routePoints: '28,50 72,35'
    }
  };

  // 플랜 모드 초기화
  const backBtn = document.getElementById('mapBackBtn');
  if (isPlanMode) {
    backBtn.onclick = () => history.back();
    document.getElementById('planBanner').classList.add('is-visible');
  } else {
    backBtn.onclick = () => location.href = './home.html';
  }

  // 경로 확인 모드 초기화
  if (isViewMode) {
    // 검색바, 필터, FAB, 팝업 숨기기
    document.getElementById('mapSearchBar').style.display = 'none';
    document.getElementById('mapFilters').style.display = 'none';
    const fab = document.querySelector('.map-fab');
    if (fab) fab.style.display = 'none';
    // 기존 카테고리 핀들 숨기기
    document.querySelectorAll('.map-pin').forEach(p => p.style.display = 'none');
    // 뒤로가기 -> history.back()
    backBtn.onclick = () => history.back();
    // view header 표시
    document.getElementById('viewHeader').classList.add('is-visible');
    // day 버튼 렌더링
    renderViewDayBtns();
    // 초기 day 렌더링
    renderViewDay(viewDay);
  }

  function renderViewDayBtns() {
    const container = document.getElementById('viewDayBtns');
    container.innerHTML = Object.keys(viewData).map(d =>
      `<button class="view-day-btn${d === viewDay ? ' is-active' : ''}"
        style="background:${viewData[d].color}"
        onclick="renderViewDay('${d}', this)">${viewData[d].label}</button>`
    ).join('');
  }

  function renderViewDay(d, btn) {
    const data = viewData[d];
    // day 버튼 active 상태
    document.querySelectorAll('.view-day-btn').forEach(b => b.classList.remove('is-active'));
    if (btn) btn.classList.add('is-active');
    else {
      const btns = document.querySelectorAll('.view-day-btn');
      btns.forEach(b => { if (b.textContent === data.label) b.classList.add('is-active'); });
    }
    // 제목
    document.getElementById('viewTitle').textContent = data.label + ' 경로';
    document.getElementById('viewTitle').style.color = data.color;
    // 기존 핀 제거
    document.getElementById('viewPinsContainer').innerHTML = '';
    // 핀 생성
    data.spots.forEach(function(spot, i) {
      const el = document.createElement('div');
      el.className = 'view-pin';
      el.style.cssText = 'left:' + spot.x + ';top:' + spot.y + ';background:' + data.color;
      el.textContent = i + 1;
      el.title = spot.name;
      document.getElementById('viewPinsContainer').appendChild(el);
    });
    // 루트 SVG — viewBox "0 0 100 100"으로 핀 % 좌표와 1:1 대응
    const svg = document.getElementById('viewRouteSvg');
    svg.setAttribute('viewBox', '0 0 100 100');
    svg.setAttribute('preserveAspectRatio', 'none');
    svg.innerHTML = '<polyline points="' + data.routePoints + '" fill="none" stroke="' + data.color + '" stroke-width="2" stroke-dasharray="7 5" stroke-linecap="round" stroke-linejoin="round" opacity="0.85" vector-effect="non-scaling-stroke"/>';
  }

  function renderPopupActions() {
    const el = document.getElementById('popupActions');
    if (isPlanMode) {
      el.innerHTML = `
        <button class="spot-popup__btn spot-popup__btn--secondary" onclick="location.href='../spot/spot-detail.html#from=map'">
          상세 보기
        </button>
        <button class="spot-popup__btn spot-popup__btn--primary" onclick="addSpotToPlan()">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round"><line x1="6.5" y1="1.5" x2="6.5" y2="11.5"/><line x1="1.5" y1="6.5" x2="11.5" y2="6.5"/></svg>
          계획에 추가
        </button>`;
    } else {
      el.innerHTML = `
        <button class="spot-popup__btn spot-popup__btn--secondary" onclick="closePopup()">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"><path d="M7 1C4 1 2 3.5 2 6V10L1 12H13L12 10V6C12 3.5 10 1 7 1Z"/><path d="M5 12Q5 13.5 7 13.5T9 12" stroke-width="1"/></svg>
          위시리스트
        </button>
        <button class="spot-popup__btn spot-popup__btn--primary" onclick="location.href='../spot/spot-detail.html#from=map'">
          상세 보기
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="4,2 10,7 4,12"/></svg>
        </button>`;
    }
  }

  function addSpotToPlan() {
    // 스팟 추가 후 출사 계획 페이지로 복귀
    history.back();
  }

  function showPopup(key) {
    const d = spotData[key];

    /* 이전 활성 핀 초기화 */
    if (activePin) document.getElementById('pin-' + activePin)?.classList.remove('is-active');
    activePin = key;
    document.getElementById('pin-' + key)?.classList.add('is-active');

    document.getElementById('popupName').textContent = d.name;
    document.getElementById('popupRating').innerHTML = d.rating + ' <span>' + d.ratingNum + '</span>';
    document.getElementById('popupLocText').textContent = d.loc;
    document.getElementById('popupScore').textContent = d.score;
    document.getElementById('popupTags').innerHTML = d.tags.map(t =>
      `<span class="spot-popup__tag">${t}</span>`).join('');
    document.getElementById('popupPhotos').innerHTML = d.photos.map(bg =>
      `<div class="spot-popup__photo" style="background:${bg}"></div>`).join('');

    renderPopupActions();
    document.getElementById('spotPopup').classList.add('is-visible');
  }

  function closePopup() {
    document.getElementById('spotPopup').classList.remove('is-visible');
    if (activePin) {
      document.getElementById('pin-' + activePin)?.classList.remove('is-active');
      activePin = null;
    }
  }

  /* 지도 빈 곳 탭 시 팝업 닫기 */
  document.querySelector('.map-canvas').addEventListener('click', function(e) {
    if (!e.target.closest('.map-pin') && !e.target.closest('.spot-popup')) closePopup();
  });

  function filterMap(el) {
    document.querySelectorAll('.map-filter').forEach(f => f.classList.remove('is-active'));
    el.classList.add('is-active');
  }

  /* ── 위치 선택 모드 ── */
  function enterSelectMode() {
    closePopup();
    document.getElementById('selectOverlay').classList.add('is-active');
  }

  function exitSelectMode() {
    document.getElementById('selectOverlay').classList.remove('is-active');
    document.getElementById('selectPin').style.display = 'none';
    document.getElementById('selectCta').classList.remove('is-active');
  }

  function handleMapTap(e) {
    const overlay = document.getElementById('selectOverlay');
    const rect = overlay.getBoundingClientRect();
    const x = ((e.clientX - rect.left) / rect.width * 100).toFixed(1);
    const y = ((e.clientY - rect.top) / rect.height * 100).toFixed(1);

    const pin = document.getElementById('selectPin');
    pin.style.display = 'block';
    pin.style.left = x + '%';
    pin.style.top = y + '%';
    document.getElementById('selectCta').classList.add('is-active');
  }

  function goRegister() {
    location.href = '../spot/spot-register.html';
  }
</script>
</body>
</html>
