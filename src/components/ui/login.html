<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PNG - 로그인</title>
  <!-- Pretendard 폰트 (SF Pro 대체, 한글 지원) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <style>
    /* ======================== */
    /* Design Tokens (Apple DS) */
    /* ======================== */
    :root {
      /* Colors */
      --color-bg: #ffffff;
      --color-surface: #f5f5f7;
      --color-text-primary: #000000;
      --color-text-secondary: rgba(0, 0, 0, 0.48);
      --color-text-tertiary: rgba(0, 0, 0, 0.28);
      --color-text-placeholder: rgba(0, 0, 0, 0.3);
      --color-accent: #0071e3;
      --color-accent-hover: #0062c4;
      --color-link: #0066cc;
      --color-border: rgba(0, 0, 0, 0.08);
      --color-input-bg: #f5f5f7;
      --color-input-border: transparent;
      --color-input-border-focus: #0071e3;
      --color-kakao: #FEE500;
      --color-kakao-text: #391B1B;
      --color-error: #ff453a;
      --color-success: #34c759;

      /* Typography */
      --font-family: 'Pretendard Variable', 'SF Pro Display', 'SF Pro Text', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;

      /* Spacing (8px grid) */
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 16px;
      --space-lg: 24px;
      --space-xl: 32px;
      --space-2xl: 48px;

      /* Radius */
      --radius-input: 12px;
      --radius-btn: 26px;
      --radius-card: 16px;
    }

    /* ======================== */
    /* Reset & Base             */
    /* ======================== */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: var(--font-family);
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      min-height: 100dvh;
    }

    /* ======================== */
    /* Phone Frame              */
    /* ======================== */
    .phone-frame {
      width: 390px;
      min-height: 844px;
      background: var(--color-bg);
      position: relative;
      overflow: hidden;
    }

    /* ======================== */
    /* Status Bar               */
    /* ======================== */
    .status-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 54px;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 34px;
    }

    .status-bar__time {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.3px;
    }

    .status-bar__icons {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-bar__icons svg {
      height: 12px;
      fill: #fff;
    }

    .dynamic-island {
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 106px;
      height: 28px;
      background: rgba(0, 0, 0, 0.65);
      border-radius: 14px;
    }

    /* ======================== */
    /* Hero Section             */
    /* ======================== */
    .hero {
      height: 380px;
      background: linear-gradient(
        to bottom,
        #1a1530 0%,
        #2d1b4e 25%,
        #8b4a6b 50%,
        #d4856a 70%,
        #e8a87c 85%,
        #f0c89a 100%
      );
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding-top: 20px;
    }

    .hero::after {
      content: '';
      position: absolute;
      bottom: -40px;
      left: 0;
      right: 0;
      height: 80px;
      background: linear-gradient(to bottom, #f0c89a, #ffffff 60%);
    }

    .hero__landscape {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: rgba(0, 0, 0, 0.12);
      clip-path: polygon(
        0% 60%, 10% 40%, 25% 55%, 40% 25%, 55% 40%, 65% 15%, 80% 35%, 100% 20%, 100% 100%, 0% 100%
      );
    }

    .hero__sun {
      position: absolute;
      top: 110px;
      right: 70px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(248, 216, 176, 0.75);
      box-shadow: 0 0 40px rgba(248, 216, 176, 0.4);
    }

    .hero__stars {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 200px;
    }

    .hero__stars span {
      position: absolute;
      width: 2px;
      height: 2px;
      background: rgba(255, 255, 255, 0.4);
      border-radius: 50%;
    }

    .hero__stars span:nth-child(1) { top: 55px; left: 80px; }
    .hero__stars span:nth-child(2) { top: 35px; left: 150px; opacity: 0.3; }
    .hero__stars span:nth-child(3) { top: 70px; left: 220px; width: 2.5px; height: 2.5px; opacity: 0.25; }
    .hero__stars span:nth-child(4) { top: 50px; left: 340px; opacity: 0.3; }
    .hero__stars span:nth-child(5) { top: 95px; left: 180px; width: 1.5px; height: 1.5px; opacity: 0.2; }

    /* ======================== */
    /* Logo                    */
    /* ======================== */
    .logo {
      position: relative;
      z-index: 2;
      text-align: center;
      margin-bottom: 8px;
    }

    .logo__icon {
      width: 52px;
      height: 52px;
      margin: 0 auto 8px;
    }

    .logo__wordmark {
      font-size: 32px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -1.2px;
      line-height: 1.1;
    }

    .logo__sub {
      font-size: 11px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 3.5px;
      margin-top: 4px;
    }

    /* ======================== */
    /* Content Area             */
    /* ======================== */
    .content {
      position: relative;
      z-index: 1;
      padding: 36px 28px 0;
    }

    .content__title {
      font-size: 28px;
      font-weight: 600;
      color: var(--color-text-primary);
      letter-spacing: -0.6px;
      line-height: 1.35;
      margin-bottom: 6px;
    }

    .content__subtitle {
      font-size: 15px;
      color: var(--color-text-secondary);
      letter-spacing: -0.2px;
      margin-bottom: var(--space-xl);
    }

    /* ======================== */
    /* Input Group              */
    /* ======================== */
    .input-group {
      position: relative;
      margin-bottom: var(--space-md);
    }

    .input-group__field {
      width: 100%;
      height: 52px;
      background: var(--color-input-bg);
      border: 1.5px solid transparent;
      border-radius: var(--radius-input);
      padding: 0 48px 0 46px;
      font-family: var(--font-family);
      font-size: 16px;
      color: var(--color-text-primary);
      letter-spacing: -0.3px;
      outline: none;
      transition: border-color 0.2s ease, background 0.2s ease;
    }

    .input-group__field::placeholder {
      color: var(--color-text-placeholder);
    }

    .input-group__field:focus {
      border-color: var(--color-input-border-focus);
      background: #fff;
    }

    .input-group__icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      color: rgba(0, 0, 0, 0.25);
      pointer-events: none;
    }

    .input-group__field:focus ~ .input-group__icon {
      color: var(--color-accent);
    }

    .input-group__toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: rgba(0, 0, 0, 0.2);
      transition: color 0.2s;
    }

    .input-group__toggle:hover {
      color: rgba(0, 0, 0, 0.45);
    }

    /* ======================== */
    /* Forgot Link              */
    /* ======================== */
    .forgot-link {
      display: block;
      text-align: right;
      font-size: 13px;
      color: var(--color-link);
      text-decoration: none;
      letter-spacing: -0.1px;
      margin-top: -4px;
      margin-bottom: var(--space-lg);
      transition: opacity 0.2s;
    }

    .forgot-link:hover {
      opacity: 0.7;
    }

    /* ======================== */
    /* Buttons                  */
    /* ======================== */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 52px;
      border-radius: var(--radius-btn);
      border: none;
      font-family: var(--font-family);
      font-size: 17px;
      font-weight: 500;
      letter-spacing: -0.3px;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn--primary {
      background: var(--color-accent);
      color: #fff;
    }

    .btn--primary:hover {
      background: var(--color-accent-hover);
    }

    /* ======================== */
    /* Divider                  */
    /* ======================== */
    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: var(--space-lg) 0;
    }

    .divider__line {
      flex: 1;
      height: 0.5px;
      background: var(--color-border);
    }

    .divider__text {
      font-size: 12px;
      color: rgba(0, 0, 0, 0.25);
      letter-spacing: 0.3px;
    }

    /* ======================== */
    /* Social Buttons           */
    /* ======================== */
    .social-row {
      display: flex;
      gap: 14px;
    }

    .btn--social {
      flex: 1;
      height: 48px;
      border-radius: 24px;
      border: none;
      font-family: var(--font-family);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: -0.2px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn--social:active {
      transform: scale(0.97);
    }

    .btn--social:hover {
      opacity: 0.88;
    }

    .btn--kakao {
      background: var(--color-kakao);
      color: var(--color-kakao-text);
    }

    .btn--apple {
      background: #000;
      color: #fff;
    }

    .btn--social svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    /* ======================== */
    /* Signup Link              */
    /* ======================== */
    .signup-link {
      text-align: center;
      margin-top: var(--space-xl);
      font-size: 14px;
      color: rgba(0, 0, 0, 0.4);
      letter-spacing: -0.15px;
      padding-bottom: var(--space-xl);
    }

    .signup-link a {
      color: var(--color-link);
      font-weight: 600;
      text-decoration: none;
      margin-left: 4px;
      transition: opacity 0.2s;
    }

    .signup-link a:hover {
      opacity: 0.7;
    }

    /* ======================== */
    /* Home Indicator           */
    /* ======================== */
    .home-indicator {
      position: fixed;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 110px;
      height: 5px;
      background: rgba(0, 0, 0, 0.1);
      border-radius: 2.5px;
    }

    /* ======================== */
    /* Responsive               */
    /* ======================== */
    @media (max-width: 390px) {
      .phone-frame {
        width: 100%;
      }
    }

    @media (min-width: 391px) {
      body {
        padding: 20px 0;
      }
      .phone-frame {
        border-radius: 40px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        overflow: hidden;
      }
      .home-indicator {
        position: absolute;
      }
    }
  </style>
</head>
<body>

<div class="phone-frame">
  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-bar__time">9:41</span>
    <div class="dynamic-island"></div>
    <div class="status-bar__icons">
      <svg viewBox="0 0 18 12" xmlns="http://www.w3.org/2000/svg">
        <rect x="0" y="9" width="3" height="3" rx="0.75"/>
        <rect x="4.5" y="6" width="3" height="6" rx="0.75"/>
        <rect x="9" y="3" width="3" height="9" rx="0.75"/>
        <rect x="13.5" y="0" width="3" height="12" rx="0.75"/>
      </svg>
      <svg viewBox="0 0 16 14" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#fff" stroke-width="1.3" stroke-linecap="round">
        <path d="M3.5 10.5Q8 5 12.5 10.5"/>
        <path d="M1 8Q8 1.5 15 8"/>
        <circle cx="8" cy="12.5" r="1.2" fill="#fff" stroke="none"/>
      </svg>
      <svg viewBox="0 0 28 14" xmlns="http://www.w3.org/2000/svg">
        <rect x="0" y="0" width="25" height="12" rx="3.5" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
        <rect x="1.5" y="1.5" width="20" height="9" rx="2" fill="#fff"/>
        <rect x="25.5" y="3.5" width="1.5" height="5" rx="0.75" fill="rgba(255,255,255,0.5)"/>
      </svg>
    </div>
  </div>

  <!-- Hero -->
  <div class="hero">
    <div class="hero__stars">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
    <div class="hero__sun"></div>
    <div class="hero__landscape"></div>

    <!-- Logo -->
    <div class="logo">
      <svg class="logo__icon" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="26" cy="26" r="23" stroke="rgba(255,255,255,0.9)" stroke-width="1.6"/>
        <circle cx="26" cy="26" r="9.5" stroke="rgba(255,255,255,0.7)" stroke-width="1.2"/>
        <circle cx="26" cy="26" r="3" fill="rgba(255,255,255,0.35)"/>
        <line x1="26" y1="5" x2="29" y2="16" stroke="rgba(255,255,255,0.4)" stroke-width="0.8" stroke-linecap="round"/>
        <line x1="44" y1="16" x2="37" y2="22" stroke="rgba(255,255,255,0.4)" stroke-width="0.8" stroke-linecap="round"/>
        <line x1="44" y1="36" x2="37" y2="30" stroke="rgba(255,255,255,0.4)" stroke-width="0.8" stroke-linecap="round"/>
        <line x1="26" y1="47" x2="23" y2="36" stroke="rgba(255,255,255,0.4)" stroke-width="0.8" stroke-linecap="round"/>
        <line x1="8" y1="36" x2="15" y2="30" stroke="rgba(255,255,255,0.4)" stroke-width="0.8" stroke-linecap="round"/>
        <line x1="8" y1="16" x2="15" y2="22" stroke="rgba(255,255,255,0.4)" stroke-width="0.8" stroke-linecap="round"/>
        <circle cx="21" cy="21" r="3.5" fill="rgba(255,255,255,0.1)"/>
      </svg>
      <div class="logo__wordmark">PNG</div>
      <div class="logo__sub">PICK N GO</div>
    </div>
  </div>

  <!-- Content -->
  <div class="content">
    <h1 class="content__title">당신만의 포토스팟을<br>발견하세요.</h1>
    <p class="content__subtitle">촬영 조건, 날씨, 골든아워까지 한눈에.</p>

    <!-- Email -->
    <div class="input-group">
      <input type="email" class="input-group__field" placeholder="이메일" autocomplete="email">
      <svg class="input-group__icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
        <rect x="1" y="4" width="18" height="13" rx="2.5"/>
        <polyline points="1,5 10,12 19,5"/>
      </svg>
    </div>

    <!-- Password -->
    <div class="input-group">
      <input type="password" id="pw" class="input-group__field" placeholder="비밀번호" autocomplete="current-password">
      <svg class="input-group__icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round">
        <rect x="3" y="9" width="14" height="10" rx="2.5"/>
        <path d="M6 9V6C6 3.2 7.8 1 10 1C12.2 1 14 3.2 14 6V9"/>
      </svg>
      <button type="button" class="input-group__toggle" onclick="togglePw()" aria-label="비밀번호 표시">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.3">
          <ellipse cx="10" cy="10" rx="9" ry="6"/>
          <circle cx="10" cy="10" r="3.2"/>
        </svg>
      </button>
    </div>

    <a href="#" class="forgot-link">비밀번호를 잊으셨나요?</a>

    <!-- Login Button -->
    <button type="button" class="btn btn--primary">로그인</button>

    <!-- Divider -->
    <div class="divider">
      <span class="divider__line"></span>
      <span class="divider__text">또는</span>
      <span class="divider__line"></span>
    </div>

    <!-- Social Login -->
    <div class="social-row">
      <button type="button" class="btn--social btn--kakao">
        <svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 2C4.5 2 0 5.8 0 10.4c0 2.9 1.9 5.5 4.8 7l-.9 3.3c-.05.2.12.35.3.22l4.2-2.8c.5.08 1.1.12 1.6.12 5.5 0 10-3.8 10-8.4C20 5.8 15.5 2 10 2z" fill="#391B1B"/>
        </svg>
        카카오
      </button>
      <button type="button" class="btn--social btn--apple">
        <svg viewBox="0 0 18 20" xmlns="http://www.w3.org/2000/svg" fill="#fff">
          <path d="M14.94 10.56c-.03-2.96 2.42-4.38 2.53-4.45-1.38-2.01-3.52-2.29-4.28-2.32-1.82-.18-3.56 1.07-4.48 1.07-.93 0-2.36-1.05-3.88-1.02-2 .03-3.84 1.16-4.87 2.95-2.08 3.6-.53 8.94 1.49 11.87.99 1.43 2.17 3.04 3.73 2.98 1.49-.06 2.06-.97 3.87-.97s2.32.97 3.9.94c1.61-.03 2.63-1.46 3.61-2.9.78-1.13 1.1-2.23 1.12-2.29-.02-.01-2.15-.82-2.17-3.27zM12.87 2.54C13.73 1.5 14.3.12 14.15-.14c-1.17.05-2.59.78-3.43 1.76-.75.87-1.41 2.26-1.23 3.59 1.3.1 2.63-.66 3.38-1.67z"/>
        </svg>
        Apple
      </button>
    </div>

    <!-- Signup -->
    <div class="signup-link">
      계정이 없으신가요?<a href="#">회원가입</a>
    </div>
  </div>

  <div class="home-indicator"></div>
</div>

<script>
  function togglePw() {
    const pw = document.getElementById('pw');
    pw.type = pw.type === 'password' ? 'text' : 'password';
  }
</script>

</body>
</html>
