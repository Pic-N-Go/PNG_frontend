<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PNG - 로그인</title>
  <link rel="stylesheet" href="../fonts.css">
  <style>
    /* ======================== */
    /* Design Tokens (Apple DS) */
    /* ======================== */
    :root {
      /* Colors */
      --color-bg: #ffffff;
      --color-surface: #f5f5f7;
      --color-text-primary: #000000;
      --color-text-secondary: rgba(0, 0, 0, 0.48);
      --color-text-tertiary: rgba(0, 0, 0, 0.28);
      --color-text-placeholder: rgba(0, 0, 0, 0.3);
      --color-accent: #e31b59;
      --color-accent-hover: #c91550;
      --color-accent-disabled: rgba(227, 27, 89, 0.25);
      --color-link: #e31b59;
      --color-border: rgba(0, 0, 0, 0.08);
      --color-input-bg: #f5f5f7;
      --color-input-border: transparent;
      --color-input-border-focus: #e31b59;
      --color-kakao: #FEE500;
      --color-kakao-text: #391B1B;
      --color-error: #ff453a;
      --color-success: #34c759;

      /* Typography */
      /* Spacing (8px grid) */
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 16px;
      --space-lg: 24px;
      --space-xl: 32px;
      --space-2xl: 48px;

      /* Radius */
      --radius-input: 12px;
      --radius-btn: 26px;
      --radius-card: 16px;
    }

    /* ======================== */
    /* Reset & Base             */
    /* ======================== */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: var(--font-family);
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      min-height: 100dvh;
    }

    /* ======================== */
    /* Phone Frame              */
    /* ======================== */
    .phone-frame {
      width: 390px;
      min-height: 844px;
      background: var(--color-bg);
      position: relative;
      overflow: hidden;
    }

    /* ======================== */
    /* Status Bar               */
    /* ======================== */
    .status-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 54px;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 34px;
    }

    .status-bar__time {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.3px;
    }

    .status-bar__icons {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-bar__icons svg {
      height: 12px;
      fill: #fff;
    }

    .dynamic-island {
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 106px;
      height: 28px;
      background: #000;
      border-radius: 14px;
    }

    /* ======================== */
    /* Hero Section             */
    /* ======================== */
    .hero {
      height: 380px;
      background: linear-gradient(
        to bottom,
        #1a1530 0%,
        #2d1b4e 25%,
        #8b4a6b 50%,
        #d4856a 70%,
        #e8a87c 85%,
        #f0c89a 100%
      );
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding-top: 20px;
    }

    .hero::after {
      content: '';
      position: absolute;
      bottom: -40px;
      left: 0;
      right: 0;
      height: 80px;
      background: linear-gradient(to bottom, #f0c89a, #ffffff 60%);
    }

    .hero__landscape {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: rgba(0, 0, 0, 0.12);
      clip-path: polygon(
        0% 60%, 10% 40%, 25% 55%, 40% 25%, 55% 40%, 65% 15%, 80% 35%, 100% 20%, 100% 100%, 0% 100%
      );
    }

    .hero__sun {
      position: absolute;
      top: 110px;
      right: 70px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(248, 216, 176, 0.75);
      box-shadow: 0 0 40px rgba(248, 216, 176, 0.4);
    }

    .hero__stars {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 200px;
    }

    .hero__stars span {
      position: absolute;
      width: 2px;
      height: 2px;
      background: rgba(255, 255, 255, 0.4);
      border-radius: 50%;
    }

    .hero__stars span:nth-child(1) { top: 55px; left: 80px; }
    .hero__stars span:nth-child(2) { top: 35px; left: 150px; opacity: 0.3; }
    .hero__stars span:nth-child(3) { top: 70px; left: 220px; width: 2.5px; height: 2.5px; opacity: 0.25; }
    .hero__stars span:nth-child(4) { top: 50px; left: 340px; opacity: 0.3; }
    .hero__stars span:nth-child(5) { top: 95px; left: 180px; width: 1.5px; height: 1.5px; opacity: 0.2; }

    /* ======================== */
    /* Logo                    */
    /* ======================== */
    .logo {
      position: relative;
      z-index: 2;
      text-align: center;
      margin-bottom: 8px;
    }

    .logo__icon {
      width: 52px;
      height: 52px;
      margin: 0 auto 8px;
    }

    .logo__wordmark {
      font-size: 32px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -1.2px;
      line-height: 1.1;
    }

    .logo__sub {
      font-size: 11px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 3.5px;
      margin-top: 4px;
    }

    /* ======================== */
    /* Content Area             */
    /* ======================== */
    .content {
      position: relative;
      z-index: 1;
      padding: 36px 28px 0;
    }

    .content__title {
      font-size: 28px;
      font-weight: 600;
      color: var(--color-text-primary);
      letter-spacing: -0.6px;
      line-height: 1.35;
      margin-bottom: 6px;
    }

    .content__subtitle {
      font-size: 15px;
      color: var(--color-text-secondary);
      letter-spacing: -0.2px;
      margin-bottom: var(--space-xl);
    }

    /* ======================== */
    /* Input Group              */
    /* ======================== */
    .input-group {
      position: relative;
      margin-bottom: var(--space-md);
    }

    .input-group__field {
      width: 100%;
      height: 52px;
      background: var(--color-input-bg);
      border: 1.5px solid transparent;
      border-radius: var(--radius-input);
      padding: 0 48px 0 46px;
      font-family: var(--font-family);
      font-size: 16px;
      color: var(--color-text-primary);
      letter-spacing: -0.3px;
      outline: none;
      transition: border-color 0.2s ease, background 0.2s ease;
    }

    .input-group__field::placeholder {
      color: var(--color-text-placeholder);
    }

    .input-group__field:focus {
      border-color: var(--color-input-border-focus);
      background: #fff;
    }

    .input-group__icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      color: rgba(0, 0, 0, 0.25);
      pointer-events: none;
    }

    .input-group__field:focus ~ .input-group__icon {
      color: var(--color-accent);
    }

    .input-group__toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: rgba(0, 0, 0, 0.2);
      transition: color 0.2s;
    }

    .input-group__toggle:hover {
      color: rgba(0, 0, 0, 0.45);
    }

    /* ======================== */
    /* Forgot Link              */
    /* ======================== */
    .forgot-link {
      display: block;
      text-align: right;
      font-size: 13px;
      color: var(--color-link);
      text-decoration: none;
      letter-spacing: -0.1px;
      margin-top: -4px;
      margin-bottom: var(--space-lg);
      transition: opacity 0.2s;
    }

    .forgot-link:hover {
      opacity: 0.7;
    }

    /* ======================== */
    /* Buttons                  */
    /* ======================== */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 52px;
      border-radius: var(--radius-btn);
      border: none;
      font-family: var(--font-family);
      font-size: 17px;
      font-weight: 500;
      letter-spacing: -0.3px;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn--primary {
      background: var(--color-accent);
      color: #fff;
    }

    .btn--primary:hover {
      background: var(--color-accent-hover);
    }

    /* ======================== */
    /* Divider                  */
    /* ======================== */
    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: var(--space-lg) 0;
    }

    .divider__line {
      flex: 1;
      height: 0.5px;
      background: var(--color-border);
    }

    .divider__text {
      font-size: 12px;
      color: rgba(0, 0, 0, 0.25);
      letter-spacing: 0.3px;
    }

    /* ======================== */
    /* Social Buttons           */
    /* ======================== */
    .social-row {
      display: flex;
      gap: 14px;
    }

    .btn--social {
      flex: 1;
      height: 48px;
      border-radius: 24px;
      border: none;
      font-family: var(--font-family);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: -0.2px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn--social:active {
      transform: scale(0.97);
    }

    .btn--social:hover {
      opacity: 0.88;
    }

    .btn--kakao {
      background: var(--color-kakao);
      color: var(--color-kakao-text);
    }

    .btn--apple {
      background: #000;
      color: #fff;
    }

    .btn--social svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    /* ======================== */
    /* Signup Link              */
    /* ======================== */
    .signup-link {
      text-align: center;
      margin-top: var(--space-xl);
      font-size: 14px;
      color: rgba(0, 0, 0, 0.4);
      letter-spacing: -0.15px;
      padding-bottom: var(--space-xl);
    }

    .signup-link a {
      color: var(--color-link);
      font-weight: 600;
      text-decoration: none;
      margin-left: 4px;
      transition: opacity 0.2s;
    }

    .signup-link a:hover {
      opacity: 0.7;
    }

    /* ======================== */
    /* Bottom Sheet (비밀번호 찾기) */
    /* ======================== */
    .sheet-dim {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .sheet-dim.is-open {
      opacity: 1;
      pointer-events: all;
    }
    .bottom-sheet {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%) translateY(100%);
      width: 390px;
      background: #fff;
      border-radius: 20px 20px 0 0;
      z-index: 201;
      transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1);
      padding-bottom: 40px;
    }
    .bottom-sheet.is-open {
      transform: translateX(-50%) translateY(0);
    }
    .sheet-handle-wrap {
      padding: 12px 0 4px;
      display: flex;
      justify-content: center;
    }
    .sheet-handle {
      width: 36px;
      height: 5px;
      border-radius: 2.5px;
      background: rgba(0, 0, 0, 0.1);
    }
    .sheet-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 24px 4px;
    }
    .sheet-header__title {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.4px;
      color: #000;
    }
    .sheet-close {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--color-surface);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .sheet-close:hover {
      background: rgba(0, 0, 0, 0.08);
    }
    .sheet-desc {
      font-size: 14px;
      color: rgba(0, 0, 0, 0.45);
      line-height: 1.55;
      letter-spacing: -0.15px;
      padding: 6px 24px 20px;
    }
    .sheet-body {
      padding: 0 24px;
    }
    .sheet-step {
      display: none;
    }
    .sheet-step.is-active {
      display: block;
    }
    .sheet-field {
      margin-bottom: 14px;
    }
    .sheet-field__label {
      font-size: 12px;
      font-weight: 500;
      color: rgba(0, 0, 0, 0.4);
      margin-bottom: 6px;
      letter-spacing: -0.08px;
    }
    .sheet-input {
      width: 100%;
      height: 50px;
      border-radius: 12px;
      border: 1.5px solid transparent;
      background: var(--color-surface);
      padding: 0 16px;
      font-family: var(--font-family);
      font-size: 16px;
      color: #000;
      letter-spacing: -0.3px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .sheet-input:focus {
      border-color: var(--color-accent);
      background: #fff;
    }
    .sheet-input::placeholder {
      color: rgba(0, 0, 0, 0.28);
    }
    /* 인증코드 입력: 큰 숫자 스타일 */
    .sheet-input--code {
      font-size: 24px;
      font-weight: 600;
      letter-spacing: 8px;
      text-align: center;
      padding: 0 16px;
    }
    .sheet-hint {
      font-size: 12px;
      color: rgba(0, 0, 0, 0.35);
      line-height: 1.5;
      margin-top: 8px;
      letter-spacing: -0.1px;
    }
    .sheet-hint--timer {
      color: var(--color-accent);
      font-weight: 500;
    }
    .sheet-submit {
      width: 100%;
      height: 52px;
      border-radius: 26px;
      border: none;
      background: var(--color-accent);
      font-family: var(--font-family);
      font-size: 16px;
      font-weight: 500;
      color: #fff;
      letter-spacing: -0.3px;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s, transform 0.1s;
    }
    .sheet-submit:hover {
      background: var(--color-accent-hover);
    }
    .sheet-submit:active {
      transform: scale(0.98);
    }
    .sheet-submit:disabled {
      background: var(--color-accent-disabled);
      color: rgba(0,0,0,0.3);
      pointer-events: none;
    }
    /* 토스트 */
    .toast {
      position: fixed;
      bottom: 48px;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      height: 44px;
      padding: 0 20px;
      border-radius: 22px;
      background: rgba(0, 0, 0, 0.75);
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      letter-spacing: -0.2px;
      z-index: 300;
      opacity: 0;
      pointer-events: none;
      white-space: nowrap;
      transition: opacity 0.3s, transform 0.3s;
    }
    .toast.is-visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ======================== */
    /* Home Indicator           */
    /* ======================== */
    .home-indicator {
      position: fixed;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 110px;
      height: 5px;
      background: rgba(0, 0, 0, 0.1);
      border-radius: 2.5px;
    }

    /* ======================== */
    /* Responsive               */
    /* ======================== */
    @media (max-width: 390px) {
      .phone-frame {
        width: 100%;
      }
    }

    @media (min-width: 391px) {
      body {
        padding: 20px 0;
      }
      .phone-frame {
        border-radius: 40px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
          min-height: unset;
          height: calc(100dvh - 40px);
          overflow-y: auto;
          overflow-x: hidden;
      }
      .home-indicator {
        position: absolute;
      }
    }
  
      /* ── 스크롤바 숨김 ── */
      * { scrollbar-width: none; -ms-overflow-style: none; }
      *::-webkit-scrollbar { display: none; }
</style>
  <style>
    #splash-screen {
      position: absolute;
      inset: 0;
      z-index: 9999;
      background: #E31B59;
      opacity: 1;
      transition: opacity 0.4s ease;
    }
    #splash-screen svg {
      width: 100%;
      height: 100%;
    }
  </style>
</head>

      <div class="sheet-field">
        <div class="sheet-field__label">이메일</div>
        <input
          type="email"

          placeholder="가입한 이메일 주소"
          autocomplete="email"
          oninput="checkForgotEmail()"
        >
      </div>

    </div>

  <!-- Step 2: 인증코드 입력 -->

      <div class="sheet-field">
        <div class="sheet-field__label">인증코드 6자리</div>
        <input
          type="text"
          id="codeInput"
          class="sheet-input sheet-input--code"
          placeholder="000000"
          maxlength="6"
          inputmode="numeric"
          autocomplete="one-time-code"
          oninput="checkCode()"
        >
        <p class="sheet-hint">
          코드를 받지 못하셨나요?
          <span class="sheet-hint--timer" id="resendTimer">재발송 (3:00)</span>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script>
  function togglePw() {
    const pw = document.getElementById('pw');
    pw.type = pw.type === 'password' ? 'text' : 'password';
  }

  /* ── 비밀번호 찾기 바텀시트 ── */
  let resendInterval = null;

  function openForgotSheet() {
    document.getElementById('sheetDim').classList.add('is-open');
    document.getElementById('forgotSheet').classList.add('is-open');
    // 초기화
    goStep(1);
    document.getElementById('forgotEmail').value = '';
    document.getElementById('sendCodeBtn').disabled = true;
    setTimeout(() => document.getElementById('forgotEmail').focus(), 350);
  }

  function closeForgotSheet() {
    document.getElementById('sheetDim').classList.remove('is-open');
    document.getElementById('forgotSheet').classList.remove('is-open');
    clearInterval(resendInterval);
  }

  function goStep(n) {
    document.querySelectorAll('.sheet-step').forEach(el => el.classList.remove('is-active'));
    document.getElementById('step' + n).classList.add('is-active');
  }

  // Step 1: 이메일 유효성 → 버튼 활성화
  function checkForgotEmail() {
    const val = document.getElementById('forgotEmail').value.trim();
    const ok = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val);
    document.getElementById('sendCodeBtn').disabled = !ok;
  }

  // Step 1 → Step 2
  function sendCode() {
    const email = document.getElementById('forgotEmail').value.trim();
    document.getElementById('step2Desc').textContent =
      email + ' 으로 인증코드를 발송했어요.';
    goStep(2);
    document.getElementById('sheetTitle').textContent = '인증코드 확인';
    document.getElementById('codeInput').value = '';
    document.getElementById('verifyBtn').disabled = true;
    startTimer();
    setTimeout(() => document.getElementById('codeInput').focus(), 100);
  }

  // Step 2: 코드 6자리 입력 → 버튼 활성화
  function checkCode() {
    const val = document.getElementById('codeInput').value.replace(/\D/g, '');
    document.getElementById('codeInput').value = val;
    document.getElementById('verifyBtn').disabled = val.length < 6;
  }

  // Step 2 → 완료
  function verifyCode() {
    clearInterval(resendInterval);
    closeForgotSheet();
    showToast('임시 비밀번호를 이메일로 발송했어요');
  }

  // 재발송 타이머 (3:00 카운트다운)
  function startTimer() {
    clearInterval(resendInterval);
    const resendTimer = document.getElementById('resendTimer');
    resendTimer.onclick = null;
    resendTimer.style.cursor = 'default';
    let remaining = 180;
    updateTimerDisplay(remaining);
    resendInterval = setInterval(() => {
      remaining--;
      updateTimerDisplay(remaining);
      if (remaining <= 0) {
        clearInterval(resendInterval);
        document.getElementById('resendTimer').textContent = '재발송';
        document.getElementById('resendTimer').style.cursor = 'pointer';
        document.getElementById('resendTimer').onclick = resendCode;
      }
    }, 1000);
  }

  function updateTimerDisplay(sec) {
    const m = String(Math.floor(sec / 60)).padStart(1, '0');
    const s = String(sec % 60).padStart(2, '0');
    document.getElementById('resendTimer').textContent = '재발송 (' + m + ':' + s + ')';
  }

  function resendCode() {
    document.getElementById('resendTimer').onclick = null;
    document.getElementById('resendTimer').style.cursor = 'default';
    startTimer();
    showToast('인증코드를 다시 발송했어요');
  }

  /* ── 토스트 ── */
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('is-visible');
    setTimeout(() => t.classList.remove('is-visible'), 2800);
  }
</script>

<script>
  (function () {
    var splash = document.getElementById('splash-screen');
    setTimeout(function () {
      splash.style.opacity = '0';

      var fallback = setTimeout(function () {
        splash.style.display = 'none';
      }, 500);

      splash.addEventListener('transitionend', function () {
        clearTimeout(fallback);
        splash.style.display = 'none';
      }, { once: true });
    }, 2500);
  })();
</script>

</body>
</html>
