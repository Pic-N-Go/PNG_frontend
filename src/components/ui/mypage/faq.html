<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PNG - 자주 묻는 질문</title>
  <link rel="stylesheet" href="../common/fonts.css">
  <link rel="stylesheet" href="../common/common.css">
  <style>
    .phone-frame{width:100%;background:var(--color-bg);position:relative;overflow:hidden;display:flex;flex-direction:column;height:100dvh}
    .scroll-area{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;padding:8px 28px 120px}

    /* ── 상태바 ── */
    .status-bar{height:50px;display:flex;align-items:center;justify-content:space-between;padding:0 30px;background:var(--color-bg);flex-shrink:0;position:relative;z-index:30}
    .status-bar__time{font-size:var(--font-md);font-weight:600;color:#000;letter-spacing:-0.3px}
    .dynamic-island{position:absolute;top:8px;left:50%;transform:translateX(-50%);width:106px;height:28px;background:#000;border-radius:14px}
    .status-bar__icons{display:flex;align-items:center;gap:6px}
    .status-bar__icons svg{height:12px;fill:#000}

    /* ── 네비 ── */
    .nav{height:52px;display:flex;align-items:center;padding:0 20px 0 12px;flex-shrink:0}
    .nav__btn{width:40px;height:40px;border-radius:50%;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.15s}
    .nav__btn:hover{background:rgba(0,0,0,0.05)}
    .nav__title{flex:1;text-align:center;margin-right:40px;font-size:var(--font-lg);font-weight:600;letter-spacing:-0.3px}

    /* ── 검색바 ── */
    .faq-search{display:flex;align-items:center;gap:8px;height:44px;padding:0 14px;background:var(--color-surface);border-radius:12px;margin-bottom:14px}
    .faq-search input{flex:1;border:none;background:none;outline:none;font-family:var(--font-family);font-size:var(--font-base);color:var(--color-text-primary)}
    .faq-search input::placeholder{color:var(--color-text-secondary)}

    /* ── 카테고리 칩 ── */
    .cat-row{display:flex;gap:8px;overflow-x:auto;margin-bottom:14px}
    .cat-chip{height:34px;padding:0 14px;border-radius:9999px;border:1px solid var(--color-border);background:#fff;font-family:var(--font-family);font-size:var(--font-sm);font-weight:500;color:var(--color-text-primary);cursor:pointer;flex-shrink:0;transition:all 0.15s}
    .cat-chip.active{background:var(--color-accent);color:#fff;font-weight:600;border-color:transparent}

    /* ── 리스트 헤더 ── */
    .faq-listhead{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px}
    .faq-listhead__title{font-size:var(--font-md);font-weight:600;color:var(--color-text-primary)}
    .faq-listhead__count{font-size:var(--font-xs);color:var(--color-text-secondary)}

    /* ── FAQ 카드(아코디언) ── */
    .faq-list{display:flex;flex-direction:column;gap:10px}
    .faq-item{background:var(--color-surface);border-radius:16px;padding:16px 18px;cursor:pointer}
    .faq-item__q{display:flex;gap:12px;align-items:center}
    .faq-item.is-open .faq-item__q{align-items:flex-start}
    .faq-badge{width:22px;height:22px;border-radius:6px;font-size:var(--font-2xs);font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .faq-badge--q{background:rgba(0,0,0,0.06);color:var(--color-text-secondary)}
    .faq-item.is-open .faq-badge--q{background:var(--color-accent);color:#fff}
    .faq-badge--a{background:#fff;color:var(--color-text-secondary);border:1px solid var(--color-border)}
    .faq-item__qtext{flex:1;font-size:var(--font-base);font-weight:500;color:var(--color-text-primary);line-height:1.45}
    .faq-item.is-open .faq-item__qtext{font-weight:600}
    .faq-item__chev{flex-shrink:0;color:var(--color-text-tertiary)}
    .faq-item.is-open .faq-item__chev{color:var(--color-text-secondary);margin-top:2px}
    .faq-item__chev--down{display:block}
    .faq-item__chev--up{display:none}
    .faq-item.is-open .faq-item__chev--down{display:none}
    .faq-item.is-open .faq-item__chev--up{display:block}
    .faq-item__a{display:none;gap:12px;align-items:flex-start;margin-top:12px;padding-top:12px;border-top:1px solid var(--color-border-light)}
    .faq-item.is-open .faq-item__a{display:flex}
    .faq-item__atext{flex:1;font-size:var(--font-sm);color:rgba(0,0,0,0.68);line-height:1.55}

    /* ── 빈 상태 ── */
    .faq-empty{display:none;flex-direction:column;align-items:center;gap:6px;padding:60px 40px 0;text-align:center}
    .faq-empty__title{font-size:var(--font-md);font-weight:600;color:var(--color-text-primary)}
    .faq-empty__desc{font-size:var(--font-sm);color:var(--color-text-secondary)}

    /* ── 문의 CTA (하단 고정) ── */
    .faq-cta-wrap{flex-shrink:0;padding:12px 28px 28px;background:var(--color-bg)}
    .faq-cta{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 18px;background:var(--color-surface);border-radius:16px;border:none;width:100%;cursor:pointer;font-family:var(--font-family);transition:opacity 0.15s}
    .faq-cta:hover{opacity:0.85}
    .faq-cta__left{display:flex;align-items:center;gap:10px}
    .faq-cta__title{font-size:var(--font-sm);font-weight:600;color:var(--color-text-primary);text-align:left}
    .faq-cta__desc{font-size:var(--font-xs);color:var(--color-text-secondary);margin-top:2px;text-align:left}
    .faq-cta__btn{height:36px;padding:0 16px;border-radius:9999px;background:var(--color-accent);color:#fff;font-size:var(--font-sm);font-weight:600;display:flex;align-items:center;flex-shrink:0}
  </style>
</head>
<body>
<div class="phone-frame">

  <!-- 상태바 -->
  <div class="status-bar">
    <span class="status-bar__time" id="status-time">9:41</span>
    <div class="dynamic-island"></div>
    <div class="status-bar__icons">
      <svg viewBox="0 0 18 12"><rect x="0" y="9" width="3" height="3" rx=".75"/><rect x="4.5" y="6" width="3" height="6" rx=".75"/><rect x="9" y="3" width="3" height="9" rx=".75"/><rect x="13.5" y="0" width="3" height="12" rx=".75"/></svg>
      <svg viewBox="0 0 16 14" fill="none" stroke="#000" stroke-width="1.3" stroke-linecap="round"><path d="M5 10.5A4 4 0 0 1 11 10.5"/><path d="M2.5 7A8 8 0 0 1 13.5 7"/><circle cx="8" cy="13" r="1.2" fill="#000" stroke="none"/></svg>
      <svg viewBox="0 0 28 14" fill="none"><rect x="0" y="0" width="25" height="12" rx="3.5" stroke="rgba(0,0,0,.35)" stroke-width="1"/><rect x="1.5" y="1.5" width="20" height="9" rx="2" fill="#000"/><rect x="25.5" y="4" width="2" height="4" rx="1" fill="rgba(0,0,0,.4)"/></svg>
    </div>
  </div>

  <!-- 네비 -->
  <div class="nav">
    <button class="nav__btn" onclick="history.back()" aria-label="뒤로가기">
      <svg width="24" height="24" viewBox="0 0 24 24" stroke="#000" stroke-width="2"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M15 6l-6 6l6 6"/></svg>
    </button>
    <span class="nav__title">자주 묻는 질문</span>
  </div>

  <div class="scroll-area">
    <!-- 검색 -->
    <label class="faq-search">
      <svg width="18" height="18" viewBox="0 0 24 24" stroke="var(--color-text-secondary)" stroke-width="2"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M10 10m-7 0a7 7 0 1 0 14 0a7 7 0 1 0 -14 0"/><path d="M21 21l-6 -6"/></svg>
      <input type="text" id="faqSearch" placeholder="궁금한 내용을 검색해 보세요" oninput="renderFAQ()">
    </label>

    <!-- 카테고리 칩 -->
    <div class="cat-row" id="catRow">
      <button class="cat-chip active" data-cat="all" onclick="setCat(this)">전체</button>
      <button class="cat-chip" data-cat="spot" onclick="setCat(this)">촬영 스팟</button>
      <button class="cat-chip" data-cat="photo" onclick="setCat(this)">사진·업로드</button>
      <button class="cat-chip" data-cat="account" onclick="setCat(this)">계정·보안</button>
      <button class="cat-chip" data-cat="guide" onclick="setCat(this)">이용안내</button>
      <button class="cat-chip" data-cat="etc" onclick="setCat(this)">기타</button>
    </div>

    <!-- 리스트 헤더 -->
    <div class="faq-listhead">
      <span class="faq-listhead__title" id="faqHeadTitle">전체 질문</span>
      <span class="faq-listhead__count" id="faqHeadCount">총 12개</span>
    </div>

    <!-- FAQ 리스트 -->
    <div class="faq-list" id="faqList"></div>

    <!-- 빈 상태 -->
    <div class="faq-empty" id="faqEmpty">
      <p class="faq-empty__title">검색 결과가 없어요</p>
      <p class="faq-empty__desc">다른 키워드로 다시 검색해 보세요.</p>
    </div>
  </div>

  <!-- 문의 CTA -->
  <div class="faq-cta-wrap">
    <button class="faq-cta" onclick="location.href='./inquiry-write.html'">
      <div class="faq-cta__left">
        <svg width="20" height="20" viewBox="0 0 24 24" stroke="var(--color-accent)" stroke-width="2"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M4 14v-3a8 8 0 1 1 16 0v3"/><path d="M18 19c0 1.657 -2.686 3 -6 3"/><path d="M4 14a2 2 0 0 1 2 -2h1a2 2 0 0 1 2 2v3a2 2 0 0 1 -2 2h-1a2 2 0 0 1 -2 -2v-3z"/><path d="M15 14a2 2 0 0 1 2 -2h1a2 2 0 0 1 2 2v3a2 2 0 0 1 -2 2h-1a2 2 0 0 1 -2 -2v-3z"/></svg>
        <div>
          <div class="faq-cta__title">원하는 답을 찾지 못했나요?</div>
          <div class="faq-cta__desc">1:1 문의로 알려드릴게요</div>
        </div>
      </div>
      <span class="faq-cta__btn">문의하기</span>
    </button>
  </div>

</div>

<script>
  (function () {
    function updateTime() {
      var now = new Date();
      var h = now.getHours(), m = now.getMinutes();
      var el = document.getElementById('status-time');
      if (el) el.textContent = h + ':' + (m < 10 ? '0' + m : m);
    }
    updateTime();
    setInterval(updateTime, 10000);
  })();

  var CAT_LABELS = { all: '전체', spot: '촬영 스팟', photo: '사진·업로드', account: '계정·보안', guide: '이용안내', etc: '기타' };

  var FAQ_LIST = [
    { id: 1, category: 'spot', q: '촬영 스팟은 어떤 기준으로 추천되나요?', a: '현재 위치·시간대·날씨·계절, 그리고 다른 유저의 촬영 이력을 종합해 추천해요. 인기 순, 거리 순, 최근 촬영 순으로 정렬을 바꿀 수도 있어요.' },
    { id: 2, category: 'spot', q: '일몰·일출 시간은 어떻게 계산되나요?', a: '스팟의 위·경도 좌표를 기준으로 매일 자동 계산돼요. 골든아워(일출 전·일몰 후 30분)와 블루아워도 함께 표시됩니다.' },
    { id: 3, category: 'spot', q: '비공개/폐쇄된 스팟은 어떻게 신고하나요?', a: '스팟 상세 화면 우측 상단 더보기(⋯) > [신고하기]에서 사유를 선택해 접수할 수 있어요. 검토 후 지도에서 숨김 처리됩니다.' },
    { id: 4, category: 'spot', q: '내가 찾은 새로운 스팟을 등록할 수 있나요?', a: '지도 화면의 [+] 버튼으로 좌표·대표 사진·간단한 촬영 팁을 함께 등록할 수 있어요. 승인 후 공개됩니다.' },
    { id: 5, category: 'photo', q: '사진 업로드 시 위치 정보는 공개되나요?', a: '기본적으로 사진의 EXIF 위치는 공개되지 않아요. 스팟에 연결해 올리는 경우에만 해당 스팟 좌표가 표시됩니다.' },
    { id: 6, category: 'photo', q: '저장한 장소는 어디서 다시 볼 수 있나요?', a: '마이페이지 > 저장한 스팟에서 확인할 수 있어요. 폴더로 묶어서 정리할 수도 있습니다.' },
    { id: 7, category: 'photo', q: '올린 사진은 언제든 삭제할 수 있나요?', a: '내가 올린 사진 화면에서 언제든 삭제 가능해요. 삭제 후 30일간 임시보관되고 그 이후 영구 삭제됩니다.' },
    { id: 8, category: 'account', q: '비밀번호를 잊어버렸어요. 어떻게 재설정하나요?', a: '로그인 화면 하단의 [비밀번호 찾기]를 눌러 가입 시 등록한 이메일로 인증코드를 받아 재설정할 수 있어요.' },
    { id: 9, category: 'account', q: '회원 탈퇴 후 데이터는 어떻게 되나요?', a: '탈퇴 시 계정 정보와 활동 이력은 30일 보관 후 영구 삭제됩니다. 관련 법령에 따라 일부 기록은 최대 5년간 보관될 수 있어요.' },
    { id: 10, category: 'guide', q: '알림 설정은 어디서 바꾸나요?', a: '마이페이지 > 설정 > 알림에서 날씨/골든아워/새 스팟 알림을 개별로 켜고 끌 수 있어요.' },
    { id: 11, category: 'guide', q: '앱 버전은 어디서 확인하나요?', a: '마이페이지 > 설정 > 앱 정보에서 확인할 수 있어요.' },
    { id: 12, category: 'etc', q: '해외에서도 사용할 수 있나요?', a: '해외에서도 지도와 스팟 정보가 그대로 노출돼요. 추천 스팟은 국내 위주로 채워져 있어 지역에 따라 결과 수가 다를 수 있어요.' }
  ];

  var currentCat = 'all';
  var openSet = new Set(); // 다중 오픈 허용

  function chevDown() {
    return '<svg class="faq-item__chev faq-item__chev--down" width="18" height="18" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M6 9l6 6l6 -6"/></svg>';
  }
  function chevUp() {
    return '<svg class="faq-item__chev faq-item__chev--up" width="18" height="18" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M6 15l6 -6l6 6"/></svg>';
  }

  function esc(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function setCat(el) {
    document.querySelectorAll('.cat-chip').forEach(function (c) { c.classList.remove('active'); });
    el.classList.add('active');
    currentCat = el.dataset.cat;
    renderFAQ();
  }

  function toggleItem(id) {
    openSet.has(id) ? openSet.delete(id) : openSet.add(id);
    renderFAQ();
  }

  function renderFAQ() {
    var q = document.getElementById('faqSearch').value.trim().toLowerCase();
    var filtered = FAQ_LIST.filter(function (f) {
      return (currentCat === 'all' || f.category === currentCat) &&
        (!q || f.q.toLowerCase().indexOf(q) !== -1 || f.a.toLowerCase().indexOf(q) !== -1);
    });

    document.getElementById('faqHeadTitle').textContent = currentCat === 'all' ? '전체 질문' : CAT_LABELS[currentCat];
    document.getElementById('faqHeadCount').textContent = '총 ' + filtered.length + '개';

    var list = document.getElementById('faqList');
    var empty = document.getElementById('faqEmpty');
    list.innerHTML = filtered.map(function (f) {
      var open = openSet.has(f.id);
      return '<div class="faq-item' + (open ? ' is-open' : '') + '" onclick="toggleItem(' + f.id + ')">' +
        '<div class="faq-item__q">' +
          '<span class="faq-badge faq-badge--q">Q</span>' +
          '<span class="faq-item__qtext">' + esc(f.q) + '</span>' +
          chevDown() + chevUp() +
        '</div>' +
        '<div class="faq-item__a">' +
          '<span class="faq-badge faq-badge--a">A</span>' +
          '<span class="faq-item__atext">' + esc(f.a) + '</span>' +
        '</div>' +
      '</div>';
    }).join('');

    empty.style.display = filtered.length === 0 ? 'flex' : 'none';
  }

  renderFAQ();
</script>
</body>
</html>
