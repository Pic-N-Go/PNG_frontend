<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PNG - 프로필 편집</title>
  <link rel="stylesheet" href="../common/fonts.css">
  <link rel="stylesheet" href="../common/common.css">
  <style>
.phone-frame{width: 100%;background:var(--color-bg);position:relative;overflow-y:auto;overflow-x:hidden;padding-bottom:100px;height:100dvh;}

    /* ── 네비 ── */
    .nav{height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 var(--space-md);position:sticky;top:0;background:var(--color-bg);z-index:20;border-bottom:0.5px solid var(--color-border-light)}
    .nav__back{width:36px;height:36px;border-radius:50%;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:rgba(0,0,0,0.5);transition:background 0.15s}
    .nav__back:hover{background:var(--color-surface)}
    .nav__title{font-size: var(--font-lg);font-weight:600;color:var(--color-text-primary);letter-spacing:-0.3px}
    .nav__placeholder{width:36px}

    /* ── 아바타 영역 ── */
    .avatar-section{display:flex;flex-direction:column;align-items:center;padding:28px 20px 24px}
    .avatar-wrap{position:relative;margin-bottom:12px;cursor:pointer}
    .avatar{width:88px;height:88px;border-radius:50%;background:linear-gradient(135deg,#2c5364,#4a7c8a);display:flex;align-items:center;justify-content:center}
    .avatar svg{opacity:0.75}
    .avatar-edit{position:absolute;bottom:0;right:0;width:28px;height:28px;border-radius:50%;background:var(--color-accent);border:2px solid #fff;display:flex;align-items:center;justify-content:center}
    .avatar-hint{font-size: var(--font-sm);color:var(--color-accent);font-weight:500;cursor:pointer}

    /* ── 폼 영역 ── */
    .form-section{padding:0 20px}
    .form-group{margin-bottom:20px}
    .form-label{font-size: var(--font-sm);font-weight:500;color:rgba(0,0,0,0.45);margin-bottom:8px;letter-spacing:-0.1px}
    .form-input{width:100%;height:52px;border-radius:12px;border:none;background:var(--color-surface);padding:0 var(--space-md);font-family:var(--font-family);font-size: var(--font-md);color:#000;outline:none;transition:box-shadow 0.2s}
    .form-input:focus{box-shadow:0 0 0 1.5px var(--color-accent);background:#fff}
    .form-input::placeholder{color:rgba(0,0,0,0.25)}
    .form-textarea{width:100%;height:96px;border-radius:12px;border:none;background:var(--color-surface);padding:14px 16px;font-family:var(--font-family);font-size: var(--font-md);color:#000;resize:none;line-height:1.5;outline:none;transition:box-shadow 0.2s}
    .form-textarea:focus{box-shadow:0 0 0 1.5px var(--color-accent);background:#fff}
    .form-textarea::placeholder{color:rgba(0,0,0,0.25)}
    .form-count{text-align:right;font-size: var(--font-xs);color:rgba(0,0,0,0.25);margin-top:4px}

    /* 상태 헬퍼 (idle/available/taken/invalid) */
    .helper{font-size:12px;color:#8a8a8e;margin-top:8px;letter-spacing:-0.1px}
    .helper.ok{color:#5a9855;display:flex;align-items:center;gap:4px}
    .helper.err{color:#ff453a}
    .helper .ok-icon{width:14px;height:14px;flex-shrink:0}

    /* @ prefix 필드 (핸들) */
    .form-input--prefix{display:flex;align-items:center;padding:0 var(--space-md)}
    .form-input--prefix .input-prefix{color:#8a8a8e;font-weight:500;margin-right:2px}
    .form-input--prefix .input-bare{flex:1;height:100%;border:none;background:none;outline:none;font-family:var(--font-family);font-size:var(--font-md);color:#000}

    /* 닉네임/핸들 중복확인 */
    .form-input-row{display:flex;gap:8px;align-items:stretch}
    .form-input-row .form-input{flex:1}
    .check-btn{padding:0 var(--space-md);border-radius:12px;border:none;background:var(--color-surface);font-family:var(--font-family);font-size: var(--font-sm);font-weight:500;color:#111;cursor:pointer;white-space:nowrap;transition:opacity 0.15s;flex-shrink:0}
    .check-btn:hover{opacity:0.7}
    .check-btn:disabled{opacity:0.5;cursor:default}

    /* 구분선 */
    .divider{height:0.5px;background:rgba(0,0,0,0.06);margin:var(--space-lg) 0}

    /* ── 하단 저장 버튼 ── */
    .cta-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width: 100%;padding:12px 20px 28px;background:linear-gradient(to top,#fff 80%,transparent);z-index:30}
    .save-btn{width:100%;height:52px;border-radius:var(--radius-btn);border:none;background:var(--color-accent);font-family:var(--font-family);font-size:16px;font-weight:600;color:#fff;cursor:pointer;transition:opacity 0.15s}
    .save-btn:hover{opacity:0.88}
    .save-btn:active{transform:scale(0.98)}
    .save-btn:disabled{background:var(--color-surface);color:#c7c7cc;cursor:default;transform:none}

    /* 토스트 */
    .toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(20px);height:44px;padding:0 20px;border-radius:22px;background:rgba(0,0,0,0.75);display:flex;align-items:center;gap:8px;font-size: var(--font-base);font-weight:500;color:#fff;z-index:200;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap}
    .toast.is-visible{opacity:1;transform:translateX(-50%) translateY(0)}

  
      /* ── 스크롤바 숨김 ── */
    </style>
</head>
<body>
<div class="phone-frame">

  <!-- 네비 -->
  <div class="nav">
    <button class="nav__back" onclick="location.href='./setting.html'" aria-label="뒤로가기">
      <svg width="18" height="18" viewBox="0 0 24 24" stroke="currentColor"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M15 6l-6 6l6 6"/></svg>
    </button>
    <span class="nav__title">프로필 편집</span>
    <div class="nav__placeholder"></div>
  </div>

  <!-- 아바타 -->
  <div class="avatar-section">
    <div class="avatar-wrap" onclick="changeAvatar()">
      <div class="avatar">
        <svg width="40" height="40" viewBox="0 0 24 24" stroke="rgba(255,255,255,0.75)"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M8 7a4 4 0 1 0 8 0a4 4 0 0 0 -8 0"/><path d="M6 21v-2a4 4 0 0 1 4 -4h4a4 4 0 0 1 4 4v2"/></svg>
      </div>
      <div class="avatar-edit">
        <svg width="12" height="12" viewBox="0 0 24 24" stroke="#fff"><path d="M4 20h4l10.5-10.5a2.828 2.828 0 1 0-4-4z"/><path d="M13.5 6.5l4 4"/></svg>
      </div>
    </div>
    <span class="avatar-hint" onclick="changeAvatar()">사진 변경</span>
  </div>

  <!-- 폼 -->
  <div class="form-section">

    <!-- 닉네임 -->
    <div class="form-group">
      <div class="form-label">닉네임</div>
      <div class="form-input-row">
        <input class="form-input" id="nickInput" type="text" value="사진가_준혁" maxlength="12" oninput="onFieldInput('nick')">
        <button class="check-btn" id="nickCheckBtn" onclick="checkField('nick')">중복 확인</button>
      </div>
      <div class="helper" id="nickHelper">한글/영문/숫자 2~12자, 특수문자 불가</div>
    </div>

    <!-- 핸들 -->
    <div class="form-group">
      <div class="form-label">핸들 (고유 ID)</div>
      <div class="form-input-row">
        <div class="form-input form-input--prefix">
          <span class="input-prefix">@</span>
          <input class="input-bare" id="handleInput" type="text" value="sunset_jk" oninput="onFieldInput('handle')">
        </div>
        <button class="check-btn" id="handleCheckBtn" onclick="checkField('handle')">중복 확인</button>
      </div>
      <div class="helper" id="handleHelper">영문·숫자·언더바만 사용 가능, 변경 후 30일 이내 재변경 불가</div>
    </div>

    <div class="divider"></div>

    <!-- 자기소개 -->
    <div class="form-group">
      <div class="form-label">자기소개</div>
      <textarea class="form-textarea" id="bioText" maxlength="100" placeholder="나를 표현하는 한 줄을 적어주세요" oninput="onFieldInput('bio')">야경과 바다를 사랑하는 아마추어 사진가</textarea>
      <div class="form-count"><span id="bioCount">20</span>/100</div>
    </div>

  </div>

  <!-- 저장 버튼 -->
  <div class="cta-bar">
    <button class="save-btn" id="saveBtn" onclick="saveProfile()" disabled>저장</button>
  </div>

</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script>
  const BIO_MAX = 100;
  const original = { nick: '사진가_준혁', handle: 'sunset_jk', bio: '야경과 바다를 사랑하는 아마추어 사진가' };
  // status: idle | checking | available | taken | invalid
  const status = { nick: 'idle', handle: 'idle' };

  const HELP = {
    nick: {
      idle: '한글/영문/숫자 2~12자, 특수문자 불가',
      available: '사용 가능한 닉네임이에요',
      taken: '이미 사용 중인 닉네임이에요',
      invalid: '사용할 수 없는 닉네임이에요',
    },
    handle: {
      idle: '영문·숫자·언더바만 사용 가능, 변경 후 30일 이내 재변경 불가',
      available: '사용 가능한 핸들이에요',
      taken: '이미 사용 중인 핸들이에요',
      invalid: '사용할 수 없는 핸들이에요',
    },
  };
  const OK_ICON = '<svg class="ok-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5l10 -10"/></svg>';

  const el = (id) => document.getElementById(id);
  const val = (field) => el(field === 'nick' ? 'nickInput' : field === 'handle' ? 'handleInput' : 'bioText').value;

  function renderHelper(field) {
    const h = el(field + 'Helper');
    const s = status[field];
    h.className = 'helper' + (s === 'available' ? ' ok' : (s === 'taken' || s === 'invalid') ? ' err' : '');
    if (s === 'checking') { h.textContent = '확인 중…'; return; }
    const msg = HELP[field][s] || HELP[field].idle;
    h.innerHTML = (s === 'available' ? OK_ICON : '') + msg;
  }

  /* 입력 시 해당 필드 확인 상태 리셋 */
  function onFieldInput(field) {
    if (field === 'bio') { updateBioCount(); updateSave(); return; }
    status[field] = 'idle';
    renderHelper(field);
    updateSave();
  }

  /* 중복 확인 (mock — API 확정 시 교체) */
  function checkField(field) {
    if (!val(field)) return;
    status[field] = 'checking';
    renderHelper(field);
    el(field + 'CheckBtn').disabled = true;
    setTimeout(() => {
      status[field] = 'available'; // ponytail: mock 항상 available, 실제 API 연동 시 교체
      renderHelper(field);
      el(field + 'CheckBtn').disabled = false;
      updateSave();
    }, 400);
  }

  /* 저장 활성 규칙: 변경 있고, 변경된 필드는 available, 자기소개 100자 이하 */
  function updateSave() {
    const nickDirty = val('nick') !== original.nick;
    const handleDirty = val('handle') !== original.handle;
    const bioDirty = val('bio') !== original.bio;
    let can = nickDirty || handleDirty || bioDirty;
    if (nickDirty && status.nick !== 'available') can = false;
    if (handleDirty && status.handle !== 'available') can = false;
    if (val('bio').length > BIO_MAX) can = false;
    el('saveBtn').disabled = !can;
  }

  /* 아바타 변경 (더미) */
  function changeAvatar() {
    showToast('앨범에서 사진을 선택해주세요');
  }

  /* 자기소개 글자 수 */
  function updateBioCount() {
    el('bioCount').textContent = el('bioText').value.length;
  }

  /* 저장 — 핸들 변경 시 확인 다이얼로그 */
  function saveProfile() {
    if (el('saveBtn').disabled) return;
    if (val('handle') !== original.handle) {
      if (!confirm('핸들을 변경할까요?\n변경 후 30일 이내에는 다시 바꿀 수 없어요.')) return;
    }
    showToast('프로필이 저장됐어요');
    setTimeout(() => location.href = './setting.html', 1200);
  }

  /* 토스트 */
  function showToast(msg) {
    const t = el('toast');
    t.textContent = msg;
    t.classList.add('is-visible');
    setTimeout(() => t.classList.remove('is-visible'), 2400);
  }

  updateBioCount();
  updateSave();
</script>
</body>
</html>
