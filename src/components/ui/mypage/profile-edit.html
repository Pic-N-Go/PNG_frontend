<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PNG - 프로필 편집</title>
  <link rel="stylesheet" href="../fonts.css">
  <style>
    :root {
      --color-bg: #ffffff;
      --color-surface: #f5f5f7;
      --color-text-primary: #000000;
      --color-text-secondary: rgba(0,0,0,0.48);
      --color-text-tertiary: rgba(0,0,0,0.28);
      --color-accent: #e31b59;
      --color-accent-hover: #c91550;
      --color-border-light: rgba(0,0,0,0.06);
      --color-success: #34c759;
      --radius-card: 16px;
      --radius-btn: 26px;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html{font-size:16px;-webkit-font-smoothing:antialiased}
    body{font-family:var(--font-family);background:#f0f0f0;display:flex;justify-content:center;min-height:100dvh}
    .phone-frame{width:390px;background:var(--color-bg);position:relative;overflow-y:auto;overflow-x:hidden;padding-bottom:100px}

    /* ── 네비 ── */
    .nav{height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;position:sticky;top:0;background:var(--color-bg);z-index:20;border-bottom:0.5px solid var(--color-border-light)}
    .nav__back{width:36px;height:36px;border-radius:50%;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:rgba(0,0,0,0.5);transition:background 0.15s}
    .nav__back:hover{background:var(--color-surface)}
    .nav__title{font-size:17px;font-weight:600;color:var(--color-text-primary);letter-spacing:-0.3px}
    .nav__placeholder{width:36px}

    /* ── 아바타 영역 ── */
    .avatar-section{display:flex;flex-direction:column;align-items:center;padding:28px 20px 24px}
    .avatar-wrap{position:relative;margin-bottom:12px;cursor:pointer}
    .avatar{width:88px;height:88px;border-radius:50%;background:linear-gradient(135deg,#2c5364,#4a7c8a);display:flex;align-items:center;justify-content:center}
    .avatar svg{opacity:0.75}
    .avatar-edit{position:absolute;bottom:0;right:0;width:28px;height:28px;border-radius:50%;background:var(--color-accent);border:2px solid #fff;display:flex;align-items:center;justify-content:center}
    .avatar-hint{font-size:13px;color:var(--color-accent);font-weight:500;cursor:pointer}

    /* ── 폼 영역 ── */
    .form-section{padding:0 20px}
    .form-group{margin-bottom:20px}
    .form-label{font-size:13px;font-weight:500;color:rgba(0,0,0,0.45);margin-bottom:8px;letter-spacing:-0.1px}
    .form-input{width:100%;height:52px;border-radius:12px;border:none;background:var(--color-surface);padding:0 16px;font-family:var(--font-family);font-size:15px;color:#000;outline:none;transition:box-shadow 0.2s}
    .form-input:focus{box-shadow:0 0 0 1.5px var(--color-accent);background:#fff}
    .form-input::placeholder{color:rgba(0,0,0,0.25)}
    .form-textarea{width:100%;height:96px;border-radius:12px;border:none;background:var(--color-surface);padding:14px 16px;font-family:var(--font-family);font-size:15px;color:#000;resize:none;line-height:1.5;outline:none;transition:box-shadow 0.2s}
    .form-textarea:focus{box-shadow:0 0 0 1.5px var(--color-accent);background:#fff}
    .form-textarea::placeholder{color:rgba(0,0,0,0.25)}
    .form-count{text-align:right;font-size:11px;color:rgba(0,0,0,0.25);margin-top:4px}
    .form-hint{font-size:12px;color:rgba(0,0,0,0.35);margin-top:6px;letter-spacing:-0.1px}

    /* 닉네임 중복확인 */
    .form-input-row{display:flex;gap:8px}
    .form-input-row .form-input{flex:1}
    .check-btn{height:50px;padding:0 16px;border-radius:12px;border:none;background:rgba(227,27,89,0.08);font-family:var(--font-family);font-size:13px;font-weight:500;color:var(--color-accent);cursor:pointer;white-space:nowrap;transition:background 0.15s;flex-shrink:0}
    .check-btn:hover{background:rgba(227,27,89,0.14)}
    .check-btn.is-ok{background:rgba(52,199,89,0.1);color:var(--color-success)}

    /* 관심 카테고리 */
    .category-chips{display:flex;flex-wrap:wrap;gap:8px}
    .category-chip{height:34px;padding:0 16px;border-radius:17px;border:none;background:var(--color-surface);font-family:var(--font-family);font-size:13px;color:rgba(0,0,0,0.45);cursor:pointer;transition:all 0.18s}
    .category-chip.is-active{background:#000;color:#fff;font-weight:500}

    /* 구분선 */
    .divider{height:0.5px;background:rgba(0,0,0,0.06);margin:24px 0}

    /* ── 하단 저장 버튼 ── */
    .cta-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:390px;padding:12px 20px 28px;background:linear-gradient(to top,#fff 80%,transparent);z-index:30}
    .save-btn{width:100%;height:52px;border-radius:var(--radius-btn);border:none;background:var(--color-accent);font-family:var(--font-family);font-size:16px;font-weight:500;color:#fff;cursor:pointer;transition:opacity 0.15s}
    .save-btn:hover{opacity:0.88}
    .save-btn:active{transform:scale(0.98)}

    /* 토스트 */
    .toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(20px);height:44px;padding:0 20px;border-radius:22px;background:rgba(0,0,0,0.75);display:flex;align-items:center;gap:8px;font-size:14px;font-weight:500;color:#fff;z-index:200;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap}
    .toast.is-visible{opacity:1;transform:translateX(-50%) translateY(0)}

    @media(max-width:390px){.phone-frame,.cta-bar{width:100%}}
    @media(min-width:391px){body{padding:20px 0}.phone-frame{border-radius:40px;box-shadow:0 20px 60px rgba(0,0,0,0.15);overflow:hidden}.cta-bar{border-radius:0 0 40px 40px}}
  
      /* ── 스크롤바 숨김 ── */
      * { scrollbar-width: none; -ms-overflow-style: none; }
      *::-webkit-scrollbar { display: none; }
</style>
</head>
<body>
<div class="phone-frame">

  <!-- 네비 -->
  <div class="nav">
    <button class="nav__back" onclick="location.href='./setting.html'" aria-label="뒤로가기">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="11,3 5,9 11,15"/></svg>
    </button>
    <span class="nav__title">프로필 편집</span>
    <div class="nav__placeholder"></div>
  </div>

  <!-- 아바타 -->
  <div class="avatar-section">
    <div class="avatar-wrap" onclick="changeAvatar()">
      <div class="avatar">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.75)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="7" r="4"/><path d="M4 21v-1a8 8 0 0 1 16 0v1"/></svg>
      </div>
      <div class="avatar-edit">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20h4l10.5-10.5a2.828 2.828 0 1 0-4-4z"/><path d="M13.5 6.5l4 4"/></svg>
      </div>
    </div>
    <span class="avatar-hint" onclick="changeAvatar()">사진 변경</span>
  </div>

  <!-- 폼 -->
  <div class="form-section">

    <!-- 닉네임 -->
    <div class="form-group">
      <div class="form-label">닉네임</div>
      <div class="form-input-row">
        <input class="form-input" id="nicknameInput" type="text" value="사진가_준혁" maxlength="12" oninput="resetNicknameCheck()">
        <button class="check-btn" id="checkBtn" onclick="checkNickname()">중복확인</button>
      </div>
      <div class="form-hint">한글/영문/숫자 2~12자, 특수문자 불가</div>
    </div>

    <!-- 핸들 -->
    <div class="form-group">
      <div class="form-label">핸들 (고유 ID)</div>
      <input class="form-input" type="text" value="@sunset_jk" placeholder="@아이디">
      <div class="form-hint">영문·숫자·언더바만 사용 가능, 변경 후 30일 이내 재변경 불가</div>
    </div>

    <div class="divider"></div>

    <!-- 바이오 -->
    <div class="form-group">
      <div class="form-label">소개</div>
      <textarea class="form-textarea" id="bioText" maxlength="100" placeholder="나를 소개해보세요" oninput="updateBioCount()">야경과 바다를 사랑하는 아마추어 사진가 📷</textarea>
      <div class="form-count"><span id="bioCount">22</span>/100</div>
    </div>

    <div class="divider"></div>

    <!-- 관심 카테고리 -->
    <div class="form-group">
      <div class="form-label">관심 카테고리</div>
      <div class="category-chips">
        <button class="category-chip is-active" onclick="toggleChip(this)">야경</button>
        <button class="category-chip is-active" onclick="toggleChip(this)">바다</button>
        <button class="category-chip" onclick="toggleChip(this)">숲</button>
        <button class="category-chip" onclick="toggleChip(this)">한옥</button>
        <button class="category-chip is-active" onclick="toggleChip(this)">일출/일몰</button>
        <button class="category-chip" onclick="toggleChip(this)">꽃</button>
        <button class="category-chip" onclick="toggleChip(this)">카페</button>
        <button class="category-chip" onclick="toggleChip(this)">인물</button>
        <button class="category-chip" onclick="toggleChip(this)">축제</button>
      </div>
    </div>

  </div>

  <!-- 저장 버튼 -->
  <div class="cta-bar">
    <button class="save-btn" onclick="saveProfile()">저장하기</button>
  </div>

</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script>
  /* 아바타 변경 (더미) */
  function changeAvatar() {
    showToast('앨범에서 사진을 선택해주세요');
  }

  /* 닉네임 중복확인 */
  function checkNickname() {
    const btn = document.getElementById('checkBtn');
    btn.textContent = '사용 가능 ✓';
    btn.classList.add('is-ok');
    showToast('사용 가능한 닉네임이에요');
  }
  function resetNicknameCheck() {
    const btn = document.getElementById('checkBtn');
    btn.textContent = '중복확인';
    btn.classList.remove('is-ok');
  }

  /* 바이오 글자 수 */
  function updateBioCount() {
    document.getElementById('bioCount').textContent = document.getElementById('bioText').value.length;
  }
  updateBioCount();

  /* 카테고리 칩 */
  function toggleChip(el) {
    el.classList.toggle('is-active');
  }

  /* 저장 */
  function saveProfile() {
    showToast('프로필이 저장됐어요 ✓');
    setTimeout(() => location.href = './mypage.html', 1200);
  }

  /* 토스트 */
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('is-visible');
    setTimeout(() => t.classList.remove('is-visible'), 2400);
  }
</script>
</body>
</html>
