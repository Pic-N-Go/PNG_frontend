<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PNG - 문의 상세</title>
  <link rel="stylesheet" href="../common/fonts.css">
  <link rel="stylesheet" href="../common/common.css">
  <style>
    .phone-frame{width:100%;background:var(--color-bg);position:relative;overflow:hidden;display:flex;flex-direction:column;height:100dvh}
    .scroll-area{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;padding-bottom:var(--space-lg)}

    /* ── 상태바 ── */
    .status-bar{height:50px;display:flex;align-items:center;justify-content:space-between;padding:0 30px;background:var(--color-bg);flex-shrink:0;position:relative;z-index:30}
    .status-bar__time{font-size: var(--font-md);font-weight:600;color:#000;letter-spacing:-0.3px}
    .dynamic-island{position:absolute;top:8px;left:50%;transform:translateX(-50%);width:106px;height:28px;background:#000;border-radius:14px}
    .status-bar__icons{display:flex;align-items:center;gap:6px}
    .status-bar__icons svg{height:12px;fill:#000}

    /* ── 네비 ── */
    .nav{height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;flex-shrink:0}
    .nav__btn{width:40px;height:40px;border-radius:50%;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.15s}
    .nav__btn:hover{background:rgba(0,0,0,0.05)}
    .nav__title{flex:1;text-align:center;font-size: var(--font-lg);font-weight:600;letter-spacing:-0.3px;padding:0 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

    /* ── 상태 헤더 ── */
    .status-header{display:flex;align-items:center;gap:8px;padding:12px 20px 0}
    .inquiry-badge{padding:4px 8px;border-radius:6px;font-size: var(--font-xs);font-weight:600}
    .inquiry-badge--answered{background:#e0f0dc;color:#5a9855}
    .inquiry-badge--pending{background:var(--color-surface);color:var(--color-text-tertiary)}
    .status-header__time{font-size: var(--font-xs);color:var(--color-text-tertiary)}

    /* ── 말풍선 ── */
    .msg-block{padding:16px 20px 0}
    .msg-meta{font-size: var(--font-xs);color:var(--color-text-tertiary);margin-bottom:8px}
    .bubble{display:inline-block;max-width:82%;padding:14px;font-size: var(--font-sm);line-height:1.55;letter-spacing:-0.1px}
    /* 내 메시지: 우측 정렬, 꼬리는 우측 하단 (의도된 비대칭 — 임의 수정 금지) */
    .bubble--mine{background:#fdecf1;color:var(--color-text-primary);border-radius:16px 16px 4px 16px;margin-left:auto;display:block;width:fit-content}
    /* 운영팀 답변: 좌측 정렬, 꼬리는 좌측 하단 (의도된 비대칭 — 임의 수정 금지) */
    .bubble--reply{background:var(--color-surface);color:var(--color-text-primary);border-radius:16px 16px 16px 4px;display:block;width:fit-content}
    .reply-meta{display:flex;align-items:center;gap:8px;margin-bottom:8px}
    .reply-avatar{width:24px;height:24px;border-radius:50%;background:#111;display:flex;align-items:center;justify-content:center}
    .reply-avatar span{color:#fff;font-size: var(--font-2xs);font-weight:600}

    /* ── 하단 액션 ── */
    .bottom-card{margin:20px;margin-top:24px;padding:14px;background:var(--color-surface);border-radius:12px}
    .bottom-card__label{font-size: var(--font-sm);color:#555;margin-bottom:10px}
    .bottom-card__actions{display:flex;gap:8px}
    .bottom-card__btn{flex:1;height:44px;background:#fff;border:none;border-radius:8px;font-family:var(--font-family);font-size: var(--font-sm);font-weight:600;cursor:pointer;transition:opacity 0.15s}
    .bottom-card__btn:hover{opacity:0.8}
    .bottom-card__note{font-size: var(--font-xs);color:var(--color-text-tertiary);line-height:1.6}

    /* ── 토스트 ── */
    .toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%) translateY(20px);height:44px;padding:0 20px;border-radius:22px;background:rgba(0,0,0,0.75);display:flex;align-items:center;font-size: var(--font-base);font-weight:500;color:#fff;z-index:200;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap}
    .toast.is-visible{opacity:1;transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>
<div class="phone-frame">

  <!-- 상태바 -->
  <div class="status-bar">
    <span class="status-bar__time" id="status-time">9:41</span>
    <div class="dynamic-island"></div>
    <div class="status-bar__icons">
      <svg viewBox="0 0 18 12"><rect x="0" y="9" width="3" height="3" rx=".75"/><rect x="4.5" y="6" width="3" height="6" rx=".75"/><rect x="9" y="3" width="3" height="9" rx=".75"/><rect x="13.5" y="0" width="3" height="12" rx=".75"/></svg>
      <svg viewBox="0 0 16 14" fill="none" stroke="#000" stroke-width="1.3" stroke-linecap="round"><path d="M5 10.5A4 4 0 0 1 11 10.5"/><path d="M2.5 7A8 8 0 0 1 13.5 7"/><circle cx="8" cy="13" r="1.2" fill="#000" stroke="none"/></svg>
      <svg viewBox="0 0 28 14" fill="none"><rect x="0" y="0" width="25" height="12" rx="3.5" stroke="rgba(0,0,0,.35)" stroke-width="1"/><rect x="1.5" y="1.5" width="20" height="9" rx="2" fill="#000"/><rect x="25.5" y="4" width="2" height="4" rx="1" fill="rgba(0,0,0,.4)"/></svg>
    </div>
  </div>

  <!-- 네비 -->
  <div class="nav">
    <button class="nav__btn" onclick="history.back()" aria-label="뒤로가기">
      <svg width="20" height="20" viewBox="0 0 24 24" stroke="#111"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M15 6l-6 6l6 6"/></svg>
    </button>
    <span class="nav__title">기능 문의</span>
    <div style="width:40px"></div>
  </div>

  <div class="scroll-area">

    <!-- 상태 헤더 -->
    <div class="status-header">
      <span class="inquiry-badge inquiry-badge--answered">답변 완료</span>
      <span class="status-header__time">2일 전</span>
    </div>

    <!-- 내가 보낸 메시지 -->
    <div class="msg-block">
      <p class="msg-meta">나 · 2일 전</p>
      <div class="bubble bubble--mine">방해 금지 시간을 스팟마다 따로 설정해야 하나요? 매번 설정하기 번거로워요.</div>
    </div>

    <!-- 운영팀 답변 -->
    <div class="msg-block">
      <div class="reply-meta">
        <div class="reply-avatar"><span>PNG</span></div>
        <span class="msg-meta" style="margin:0">고객지원팀 · 1일 전</span>
      </div>
      <div class="bubble bubble--reply">안녕하세요! 이제 마이페이지 &gt; 환경설정 &gt; 방해 금지에서 한 번에 관리하실 수 있어요. 스팟별 설정은 제거됐어요.</div>
    </div>

    <!-- 답변 완료: 도움 여부 카드 -->
    <div class="bottom-card">
      <p class="bottom-card__label">이 답변이 도움이 되셨나요?</p>
      <div class="bottom-card__actions">
        <button class="bottom-card__btn" style="color:#111" onclick="showToast('소중한 의견 감사합니다 ✓')">👍 해결됐어요</button>
        <button class="bottom-card__btn" style="color:var(--color-accent)" onclick="showToast('추가 문의는 새 문의로 작성해 주세요')">추가 문의</button>
      </div>
    </div>

    <!-- 답변 대기 상태였다면 아래 배너로 대체 (참고용, 기본 숨김) -->
    <div class="bottom-card" style="display:none">
      <p class="bottom-card__note">답변을 준비하고 있어요. 평균 24시간 이내에 답변드릴게요.</p>
    </div>

  </div>

  <!-- 토스트 -->
  <div class="toast" id="toast"></div>

</div>

<script>
  (function() {
    function updateTime() {
      var now = new Date();
      var h = now.getHours(), m = now.getMinutes();
      var el = document.getElementById('status-time');
      if (el) el.textContent = h + ':' + (m < 10 ? '0' + m : m);
    }
    updateTime();
    setInterval(updateTime, 10000);
  })();

  function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('is-visible');
    setTimeout(function() { t.classList.remove('is-visible'); }, 2500);
  }
</script>
</body>
</html>
