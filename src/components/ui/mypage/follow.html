<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>PNG - 팔로워/팔로잉</title>
  <link rel="stylesheet" href="../common/fonts.css">
  <link rel="stylesheet" href="../common/common.css">
    <style>
      .phone-frame {
        width: 100%;
        background: var(--color-bg);
        position: relative;
        overflow-y: auto;
        overflow-x: hidden;
        padding-bottom: 40px;
      }

      /* ── 네비 ── */
      .nav {
        height: 54px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 var(--space-md);
        position: sticky;
        top: 0;
        background: var(--color-bg);
        z-index: 20;
        border-bottom: 0.5px solid var(--color-border-light);
      }
      .nav__back {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: none;
        background: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: rgba(0, 0, 0, 0.5);
        transition: background 0.15s;
      }
      .nav__back:hover { background: var(--color-surface); }
      .nav__title {
        font-size: var(--font-lg);
        font-weight: 600;
        color: var(--color-text-primary);
        letter-spacing: -0.3px;
      }
      .nav__placeholder { width: 36px; }

      /* ── 탭 ── */
      .follow-tabs {
        display: flex;
        border-bottom: 0.5px solid rgba(0,0,0,0.07);
        margin: 0 20px;
        position: sticky;
        top: 54px;
        background: var(--color-bg);
        z-index: 10;
      }
      .follow-tab {
        flex: 1;
        height: 44px;
        background: none;
        border: none;
        font-family: var(--font-family);
        font-size: var(--font-base);
        font-weight: 500;
        color: rgba(0,0,0,0.35);
        cursor: pointer;
        position: relative;
        transition: color 0.2s;
        letter-spacing: -0.15px;
      }
      .follow-tab.is-active { color: #000; font-weight: 600; }
      .follow-tab.is-active::after {
        content: '';
        position: absolute;
        bottom: -0.5px;
        left: 20%;
        right: 20%;
        height: 2px;
        background: #000;
        border-radius: 1px;
      }

      /* ── 목록 ── */
      .follow-list { padding: 4px 20px 20px; }
      .follow-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 0;
        border-bottom: 0.5px solid rgba(0,0,0,0.04);
      }
      .follow-item:last-child { border-bottom: none; }
      .follow-item__avatar {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        font-weight: 600;
        color: #fff;
      }
      .follow-item__info { flex: 1; min-width: 0; }
      .follow-item__name {
        font-size: var(--font-base);
        font-weight: 600;
        color: #000;
        letter-spacing: -0.2px;
        margin-bottom: 1px;
      }
      .follow-item__handle {
        font-size: 12px;
        color: rgba(0,0,0,0.35);
        letter-spacing: -0.1px;
      }
      .follow-item__action {
        flex-shrink: 0;
        height: 30px;
        padding: 0 14px;
        border-radius: 15px;
        border: none;
        font-family: var(--font-family);
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.15s;
      }
      .follow-item__action--remove {
        background: var(--color-surface);
        color: rgba(0,0,0,0.45);
      }
      .follow-item__action--remove:hover {
        background: rgba(255,69,58,0.08);
        color: #ff453a;
      }
      .follow-item__action--following {
        background: var(--color-surface);
        color: rgba(0,0,0,0.55);
      }
      .follow-item__action--following:hover {
        background: rgba(255,69,58,0.08);
        color: #ff453a;
      }
      .follow-item__action--follow {
        background: #000;
        color: #fff;
      }
      .follow-empty {
        padding: 40px 0;
        text-align: center;
        font-size: var(--font-base);
        color: rgba(0,0,0,0.3);
      }

      /* ── 토스트 ── */
      .toast {
        position: fixed;
        bottom: 96px;
        left: 50%;
        transform: translateX(-50%) translateY(16px);
        height: 44px;
        padding: 0 20px;
        border-radius: 22px;
        background: rgba(0,0,0,0.75);
        display: flex;
        align-items: center;
        font-size: var(--font-base);
        font-weight: 500;
        color: #fff;
        letter-spacing: -0.2px;
        z-index: 300;
        opacity: 0;
        pointer-events: none;
        white-space: nowrap;
        transition: opacity 0.3s, transform 0.3s;
      }
      .toast.is-visible {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    </style>
  </head>
  <body>
    <div class="phone-frame">
      <!-- 네비 -->
      <div class="nav">
        <button class="nav__back" onclick="location.href = './mypage.html'" aria-label="뒤로가기">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="11,3 5,9 11,15" />
          </svg>
        </button>
        <span class="nav__title">팔로우</span>
        <div class="nav__placeholder"></div>
      </div>

      <!-- 탭 -->
      <div class="follow-tabs">
        <button class="follow-tab is-active" id="tabFollowers" onclick="switchFollowTab('followers')">팔로워</button>
        <button class="follow-tab" id="tabFollowing" onclick="switchFollowTab('following')">팔로잉</button>
      </div>

      <!-- 목록 -->
      <div class="follow-list" id="followList"></div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      var toastTimeout;

      function showToast(msg) {
        var t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('is-visible');
        clearTimeout(toastTimeout);
        toastTimeout = setTimeout(function () { t.classList.remove('is-visible'); }, 2800);
      }

      var followData = {
        followers: [
          { id: 1, name: '한강뷰어', handle: '@hangang_view', color: '#2c5364', initial: '한', mutual: true },
          { id: 2, name: '봄날의사진', handle: '@spring_shot', color: '#4a3060', initial: '봄', mutual: false },
          { id: 3, name: '골든아워헌터', handle: '@golden_h', color: '#6b3a2a', initial: '골', mutual: true },
          { id: 4, name: '제주스냅', handle: '@jeju_snap', color: '#1a4a3a', initial: '제', mutual: false },
          { id: 5, name: '야경마스터', handle: '@night_master', color: '#2a2a5a', initial: '야', mutual: true },
        ],
        following: [
          { id: 1, name: '한강뷰어', handle: '@hangang_view', color: '#2c5364', initial: '한', following: true },
          { id: 2, name: '골든아워헌터', handle: '@golden_h', color: '#6b3a2a', initial: '골', following: true },
          { id: 3, name: '야경마스터', handle: '@night_master', color: '#2a2a5a', initial: '야', following: true },
          { id: 4, name: '부산사진관', handle: '@busan_photo', color: '#1a3a5a', initial: '부', following: true },
          { id: 5, name: '새벽빛', handle: '@dawn_light', color: '#3a4a2a', initial: '새', following: false },
        ]
      };

      function switchFollowTab(tab) {
        document.getElementById('tabFollowers').classList.toggle('is-active', tab === 'followers');
        document.getElementById('tabFollowing').classList.toggle('is-active', tab === 'following');
        renderFollowList(tab);
      }

      function renderFollowList(tab) {
        var list = document.getElementById('followList');
        var data = followData[tab];

        if (!data.length) {
          list.innerHTML = '<div class="follow-empty">' +
            (tab === 'followers' ? '팔로워가 없어요' : '팔로잉한 사람이 없어요') + '</div>';
          return;
        }

        list.innerHTML = data.map(function (u) {
          var actionBtn = tab === 'followers'
            ? '<button class="follow-item__action follow-item__action--remove" onclick="removeFollower(' + u.id + ')">삭제</button>'
            : (u.following
                ? '<button class="follow-item__action follow-item__action--following" onclick="toggleFollow(' + u.id + ', this)">팔로잉</button>'
                : '<button class="follow-item__action follow-item__action--follow" onclick="toggleFollow(' + u.id + ', this)">팔로우</button>'
              );
          return '<div class="follow-item" id="follow-item-' + tab + '-' + u.id + '">' +
            '<div class="follow-item__avatar" style="background:' + u.color + '">' + u.initial + '</div>' +
            '<div class="follow-item__info">' +
              '<div class="follow-item__name">' + u.name + '</div>' +
              '<div class="follow-item__handle">' + u.handle + '</div>' +
            '</div>' +
            actionBtn +
          '</div>';
        }).join('');
      }

      function removeFollower(id) {
        var idx = followData.followers.findIndex(function (u) { return u.id === id; });
        if (idx === -1) return;
        followData.followers.splice(idx, 1);
        renderFollowList('followers');
        showToast('팔로워를 삭제했어요');
      }

      function toggleFollow(id, btn) {
        var user = followData.following.find(function (u) { return u.id === id; });
        if (!user) return;
        user.following = !user.following;
        if (user.following) {
          btn.textContent = '팔로잉';
          btn.className = 'follow-item__action follow-item__action--following';
        } else {
          btn.textContent = '팔로우';
          btn.className = 'follow-item__action follow-item__action--follow';
          showToast(user.name + ' 팔로우를 취소했어요');
        }
      }

      /* 진입 탭: mypage.html?tab=following 으로 들어오면 팔로잉부터 */
      var initTab = new URLSearchParams(location.search).get('tab') === 'following' ? 'following' : 'followers';
      switchFollowTab(initTab);
    </script>
  </body>
</html>
