<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>PNG - PIC MAP</title>
  <link rel="stylesheet" href="../common/fonts.css">
  <link rel="stylesheet" href="../common/common.css">
    <style>
.phone-frame {
        width: 100%;
        height: 100dvh;
        background: var(--color-bg);
        position: relative;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      /* ======= 네비 (지도 위 플로팅) ======= */
      .nav-bar {
        position: absolute;
        top: 0; left: 0; right: 0;
        z-index: 50;
        height: 54px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 16px;
        background: rgba(255,255,255,0.92);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border-bottom: 0.5px solid var(--color-border-light);
      }
      .nav-bar__back {
        width: 36px; height: 36px;
        border-radius: 50%;
        background: none; border: none;
        cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        transition: background 0.15s;
        flex-shrink: 0;
      }
      .nav-bar__back:hover { background: rgba(0,0,0,0.05); }
      .nav-bar__title {
        font-size: var(--font-lg); font-weight: 600;
        color: var(--color-text-primary);
        letter-spacing: -0.3px;
      }

      /* ======= 필터 칩 (네비 바로 아래) ======= */
      .filter-bar {
        position: absolute;
        top: 54px; left: 0; right: 0;
        z-index: 40;
        display: flex;
        gap: 7px;
        padding: 10px 16px;
        background: rgba(255,255,255,0.88);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 0.5px solid var(--color-border-light);
      }
      .filter-chip {
        height: 30px;
        padding: 0 14px;
        border-radius: 15px;
        border: none;
        font-family: var(--font-family);
        font-size: var(--font-sm);
        font-weight: 500;
        white-space: nowrap;
        cursor: pointer;
        transition: all 0.15s;
        letter-spacing: -0.1px;
      }
      .filter-chip.is-active {
        background: var(--color-text-primary);
        color: #fff;
      }
      .filter-chip:not(.is-active) {
        background: var(--color-surface);
        color: rgba(0,0,0,0.5);
      }
      .filter-chip--fav.is-active { background: var(--color-accent); }

      /* ======= 지도 캔버스 ======= */
      .map-canvas {
        position: absolute;
        inset: 0;
        overflow: hidden;
      }
      /* 배경 블록들 */
      .map-block {
        position: absolute;
        background: rgba(0,0,0,0.06);
        border-radius: 4px;
      }
      /* 도로 */
      .map-road {
        position: absolute;
        background: #fff;
      }
      /* 공원 — home/map 과 동일 톤 */
      .map-park {
        position: absolute;
        background: rgba(0,0,0,0.06);
        border-radius: 4px;
      }
      /* 강 — 동일 톤 */
      .map-water {
        position: absolute;
        background: rgba(0,0,0,0.04);
        border-radius: 2px;
      }
      /* 그리드 */
      .map-grid {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }
      .map-grid line { stroke: rgba(0,0,0,0.04); stroke-width: 0.5; }

      /* ======= 현재 위치 ======= */
      .map-me {
        position: absolute;
        width: 20px; height: 20px;
        transform: translate(-50%, -50%);
      }
      .map-me__pulse {
        position: absolute;
        inset: -6px;
        border-radius: 50%;
        background: rgba(0,113,227,0.12);
        animation: pulse 2.4s ease-out infinite;
      }
      .map-me__ring {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 2px solid rgba(0,113,227,0.3);
      }
      .map-me__dot {
        position: absolute;
        inset: 4px;
        border-radius: 50%;
        background: #0071e3;
        border: 2px solid #fff;
        box-shadow: 0 1px 4px rgba(0,113,227,0.4);
      }
      @keyframes pulse {
        0%   { transform: scale(1);   opacity: 1; }
        100% { transform: scale(2.8); opacity: 0; }
      }

      /* ======= 핀 ======= */
      .map-pin {
        position: absolute;
        transform: translate(-50%, -100%);
        line-height: 0;
        cursor: pointer;
        z-index: 5;
        transition: filter 0.15s, transform 0.15s;
      }
      .map-pin:hover { transform: translate(-50%, -110%); }
      .map-pin--visit svg path { fill: #1c1c1e; }
      .map-pin--fav   svg path { fill: #E31B59; }
      .map-pin--visit { filter: drop-shadow(0 2px 4px rgba(0,0,0,0.25)); }
      .map-pin--fav   { filter: drop-shadow(0 2px 6px rgba(227,27,89,0.45)); }
      .map-pin.is-active.map-pin--visit { filter: drop-shadow(0 3px 6px rgba(0,0,0,0.35)); }
      .map-pin.is-active.map-pin--fav   { filter: drop-shadow(0 3px 10px rgba(227,27,89,0.6)); }

      /* ======= 지도 컨트롤 ======= */
      .map-controls {
        position: absolute;
        right: 14px;
        bottom: 220px;
        z-index: 30;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .map-ctrl-group {
        display: flex;
        flex-direction: column;
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.12);
        overflow: hidden;
      }
      .map-ctrl-btn {
        width: 40px; height: 40px;
        background: none; border: none;
        cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        transition: background 0.15s;
        color: rgba(0,0,0,0.55);
        font-size: 20px; line-height: 1;
        font-weight: 300;
      }
      .map-ctrl-btn:hover { background: rgba(0,0,0,0.04); }
      .map-ctrl-btn + .map-ctrl-btn { border-top: 0.5px solid rgba(0,0,0,0.07); }
      .map-ctrl-loc {
        width: 40px; height: 40px;
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.12);
        border: none; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        transition: background 0.15s;
      }
      .map-ctrl-loc:hover { background: rgba(0,0,0,0.04); }

      /* ======= 레전드 ======= */
      .map-legend {
        position: absolute;
        left: 14px;
        bottom: 220px;
        z-index: 30;
        background: rgba(255,255,255,0.88);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-radius: 10px;
        padding: 8px 12px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      }
      .legend-item {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: var(--font-xs);
        color: rgba(0,0,0,0.55);
        letter-spacing: -0.1px;
      }
      .legend-pin {
        line-height: 0; flex-shrink: 0;
      }

      /* ======= 스팟 바텀 시트 ======= */
      .spot-sheet {
        position: absolute;
        bottom: 0; left: 0; right: 0;
        z-index: 60;
        background: #fff;
        border-radius: 20px 20px 0 0;
        padding: 0 0 32px;
        transform: translateY(100%);
        transition: transform 0.32s cubic-bezier(0.32,0.72,0,1);
        box-shadow: 0 -4px 24px rgba(0,0,0,0.1);
      }
      .spot-sheet.is-open { transform: translateY(0); }
      .sheet-handle-wrap {
        padding: 12px 0 2px;
        display: flex; justify-content: center;
      }
      .sheet-handle {
        width: 36px; height: 5px;
        border-radius: 2.5px;
        background: rgba(0,0,0,0.1);
      }

      /* 스팟 리스트 시트 (전체 목록) */
      .spot-list-sheet {
        position: absolute;
        bottom: 0; left: 0; right: 0;
        z-index: 55;
        background: #fff;
        border-radius: 20px 20px 0 0;
        max-height: 70vh;
        display: flex;
        flex-direction: column;
        transform: translateY(calc(100% - 200px)); /* 살짝 열린 상태 */
        transition: transform 0.32s cubic-bezier(0.32,0.72,0,1);
        box-shadow: 0 -4px 24px rgba(0,0,0,0.1);
      }
      .spot-list-sheet.is-expanded { transform: translateY(0); }
      .spot-list-sheet.is-hidden   { transform: translateY(100%); }

      .sheet-top {
        padding: 0 20px 0;
        flex-shrink: 0;
      }
      .sheet-top__drag {
        padding: 12px 0 8px;
        display: flex; justify-content: center;
        cursor: pointer;
      }
      .sheet-summary {
        display: flex;
        align-items: baseline;
        gap: 8px;
        padding-bottom: 12px;
        border-bottom: 0.5px solid rgba(0,0,0,0.06);
      }
      .sheet-summary__title {
        font-size: var(--font-lg); font-weight: 600;
        color: #000; letter-spacing: -0.3px;
      }
      .sheet-summary__count {
        font-size: var(--font-sm); color: rgba(0,0,0,0.35);
        letter-spacing: -0.1px;
      }
      .sheet-list {
        overflow-y: auto;
        flex: 1;
        padding: 8px 20px 16px;
      }
      /* 스팟 행 */
      .spot-row {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 0;
        border-bottom: 0.5px solid rgba(0,0,0,0.05);
        cursor: pointer;
        transition: background 0.1s;
      }
      .spot-row:last-child { border-bottom: none; }
      .spot-row:hover { background: rgba(0,0,0,0.02); margin: 0 -4px; padding: 10px 4px; border-radius: 8px; }
      .spot-row__thumb {
        width: 52px; height: 52px;
        border-radius: 10px;
        flex-shrink: 0;
        position: relative;
        overflow: hidden;
      }
      .spot-row__pin {
        position: absolute;
        bottom: 4px; left: 4px;
        line-height: 0;
      }
      .spot-row__info { flex: 1; min-width: 0; }
      .spot-row__name {
        font-size: var(--font-md); font-weight: 600;
        color: #000; letter-spacing: -0.2px;
        margin-bottom: 2px;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .spot-row__meta {
        font-size: 12px; color: rgba(0,0,0,0.38);
        letter-spacing: -0.1px; margin-bottom: 4px;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .spot-row__tags { display: flex; gap: 5px; }
      .spot-row__tag {
        height: 18px; padding: 0 7px;
        border-radius: 9px;
        font-size: var(--font-2xs); font-weight: 500;
        display: inline-flex; align-items: center;
      }
      .spot-row__tag--date  { background: rgba(0,0,0,0.06); color: rgba(0,0,0,0.4); }
      .spot-row__tag--score { background: rgba(227,27,89,0.08); color: var(--color-accent); font-weight: 600; }
      .spot-row__tag--fav   { background: rgba(227,27,89,0.08); color: var(--color-accent); }
      .spot-row__arrow {
        color: rgba(0,0,0,0.18); flex-shrink: 0;
      }

      /* 단일 스팟 미리보기 카드 */
      .spot-preview {
        padding: 0 20px 0;
      }
      .spot-preview__thumb {
        width: 100%; height: 130px;
        border-radius: 14px;
        margin-bottom: 14px;
        position: relative;
        overflow: hidden;
      }
      .spot-preview__gradient {
        position: absolute; inset: 0;
        background: linear-gradient(to top, rgba(0,0,0,0.45), transparent);
      }
      .spot-preview__badge {
        position: absolute;
        bottom: 10px; left: 12px;
        display: flex; gap: 5px;
      }
      .spot-preview__tag {
        height: 20px; padding: 0 8px;
        border-radius: 10px;
        background: rgba(255,255,255,0.18);
        backdrop-filter: blur(4px);
        font-size: var(--font-xs); font-weight: 500;
        color: rgba(255,255,255,0.9);
        display: inline-flex; align-items: center;
      }
      .spot-preview__name {
        font-size: 18px; font-weight: 600;
        color: #000; letter-spacing: -0.3px;
        margin-bottom: 3px;
      }
      .spot-preview__loc {
        font-size: var(--font-sm); color: rgba(0,0,0,0.4);
        margin-bottom: 14px; letter-spacing: -0.1px;
      }
      .spot-preview__row {
        display: flex; gap: 8px;
        margin-bottom: 16px;
      }
      .spot-preview__stat {
        flex: 1;
        background: var(--color-surface);
        border-radius: 10px;
        padding: 10px 12px;
      }
      .spot-preview__stat-label {
        font-size: var(--font-2xs); color: rgba(0,0,0,0.35);
        margin-bottom: 3px; letter-spacing: -0.05px;
      }
      .spot-preview__stat-val {
        font-size: var(--font-md); font-weight: 600;
        color: #000; letter-spacing: -0.2px;
      }
      .spot-preview__stat-val--accent { color: var(--color-accent); }
      .spot-preview__btn {
        width: 100%; height: 48px;
        border-radius: 24px;
        border: none;
        background: #000;
        font-family: var(--font-family);
        font-size: var(--font-md); font-weight: 500;
        color: #fff; letter-spacing: -0.2px;
        cursor: pointer;
        transition: opacity 0.15s;
      }
      .spot-preview__btn:hover { opacity: 0.85; }

      /* 다이머 */
      .dim {
        position: absolute; inset: 0;
        background: rgba(0,0,0,0.3);
        z-index: 54;
        opacity: 0; pointer-events: none;
        transition: opacity 0.25s;
      }
      .dim.is-visible { opacity: 1; pointer-events: all; }
      }
    </style>
  </head>

        <!-- 도로 -->

          <div class="map-me__pulse"></div>

        <!-- 방문 핀 (검정) -->

        <div class="map-pin map-pin--visit" style="left:67%;top:48%" onclick="showSpot('namsangol')">
          <svg width="24" height="30" viewBox="0 0 24 30" fill="none">
            <path d="M12 0C5.4 0 0 5.4 0 12C0 20 12 30 12 30S24 20 24 12C24 5.4 18.6 0 12 0Z" fill="#E31B59"/>
            <circle cx="12" cy="10.5" r="4.5" fill="#fff"/>
          </svg>
        </div>
        <div class="map-pin map-pin--fav" style="left:56%;top:54%" onclick="showSpot('cheonggyecheon')">

    <script>
      var spots = {
        gwanganri: {
          name: '광안리 해수욕장', loc: '부산 · 수영구',
          bg: 'linear-gradient(135deg,#0f2027,#203a43,#e8a87c)',
          date: '2026.03.28', count: 12, score: 91, fav: true, time: '일출'
        },
        gyeongbokgung: {
          name: '경복궁', loc: '서울 · 종로구',
          bg: 'linear-gradient(135deg,#1a1530,#b44a3a)',
          date: '2026.03.08', count: 31, score: 85, fav: false, time: '야경'
        },
        jeju: {
          name: '사려니숲길', loc: '제주 · 조천읍',
          bg: 'linear-gradient(135deg,#0a1a0f,#4a8060)',
          date: '2026.04.15', count: 18, score: 79, fav: false, time: '낮'
        },
        jinhe: {
          name: '진해 경화역', loc: '경남 · 창원시',
          bg: 'linear-gradient(135deg,#8b4a6b,#f0c89a)',
          date: '2026.04.02', count: 24, score: 88, fav: true, time: '낮'
        },
        gamcheon: {
          name: '감천문화마을', loc: '부산 · 사하구',
          bg: 'linear-gradient(135deg,#3a2a1a,#c8804a)',
          date: '2026.02.14', count: 17, score: 82, fav: false, time: '낮'
        },
        yeongwol: {
          name: '영월 별마로천문대', loc: '강원 · 영월군',
          bg: 'linear-gradient(135deg,#020010,#1a1545)',
          date: '2025.10.03', count: 22, score: 94, fav: false, time: '야경'
        },
        gyeongju: {
          name: '경주 불국사', loc: '경북 · 경주시',
          bg: 'linear-gradient(135deg,#5a3010,#c87020)',
          date: '2025.11.05', count: 18, score: 87, fav: false, time: '낮'
        }
      };

      var listExpanded = false;
      var currentSpot = null;

      function showSpot(id) {
        if (currentSpot === id) { closeSpot(); return; }
        var s = spots[id];
        if (!s) return;
        currentSpot = id;
        var favTag = s.fav
          ? '<span class="spot-preview__tag">즐겨찾기</span>'
          : '';
        document.getElementById('spotPreviewContent').innerHTML = `
          <div class="spot-preview__thumb" style="background:${s.bg}">
            <div class="spot-preview__gradient"></div>
            <div class="spot-preview__badge">
              <span class="spot-preview__tag">${s.time}</span>
              ${favTag}
            </div>
          </div>
          <div class="spot-preview__name">${s.name}</div>
          <div class="spot-preview__loc">${s.loc}</div>
          <div class="spot-preview__row">
            <div class="spot-preview__stat">
              <div class="spot-preview__stat-label">포토제닉 점수</div>
              <div class="spot-preview__stat-val spot-preview__stat-val--accent">${s.score}점</div>
            </div>
            <div class="spot-preview__stat">
              <div class="spot-preview__stat-label">촬영 사진</div>
              <div class="spot-preview__stat-val">${s.count}장</div>
            </div>
            <div class="spot-preview__stat">
              <div class="spot-preview__stat-label">최근 방문</div>
              <div class="spot-preview__stat-val" style="font-size:12px;letter-spacing:-0.1px">${s.date}</div>
            </div>
          </div>
          <button class="spot-preview__btn" onclick="location.href='../spot/spot-detail.html'">스팟 상세보기</button>
        `;
        document.getElementById('spotSheet').classList.add('is-open');
        document.getElementById('dim').classList.add('is-visible');
        collapseList();
      }

      function closeSpot() {
        document.getElementById('spotSheet').classList.remove('is-open');
        document.getElementById('dim').classList.remove('is-visible');
        currentSpot = null;
      }

      function expandList() {
        if (currentSpot) return;
        if (!listExpanded) {
          document.getElementById('spotListSheet').classList.add('is-expanded');
          listExpanded = true;
        }
      }

      function collapseList() {
        document.getElementById('spotListSheet').classList.remove('is-expanded');
        listExpanded = false;
      }

      function filterPins(type) {
        document.querySelectorAll('.filter-chip').forEach(function(c) {
          c.classList.remove('is-active');
        });
        var id = type === 'all' ? 'chip-all' : type === 'visit' ? 'chip-visit' : 'chip-fav';
        document.getElementById(id).classList.add('is-active');
        /* 목업: 필터 선택만 시각화 */
        var countEl = document.getElementById('summaryCount');
        var titleEl = document.querySelector('.sheet-summary__title');
        if (type === 'all')   { countEl.textContent = '28곳'; titleEl.textContent = '방문한 스팟'; }
        if (type === 'visit') { countEl.textContent = '21곳'; titleEl.textContent = '방문'; }
        if (type === 'fav')   { countEl.textContent = '7곳';  titleEl.textContent = '즐겨찾기'; }
      }
