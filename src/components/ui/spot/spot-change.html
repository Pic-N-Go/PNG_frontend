<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PNG - 스팟 변경</title>
  <link rel="stylesheet" href="../common/fonts.css">
  <link rel="stylesheet" href="../common/common.css">
  <style>
    .phone-frame { width: 100%; height: 100dvh; background:var(--color-bg); position:relative; overflow:hidden }

    /* ── 상태바 ── */
    .status-bar { height:54px; display:flex; align-items:center; justify-content:space-between; padding:0 20px; position:relative; z-index:30; background:#fff }
    .status-bar__time { font-size: var(--font-md); font-weight:600; letter-spacing:-0.3px }
    .dynamic-island { position:absolute; top:8px; left:50%; transform:translateX(-50%); width:106px; height:28px; background:#000; border-radius:14px }
    .status-bar__right { display:flex; align-items:center; gap:6px }

    /* ── 컨텍스트 배너 ── */
    .context-banner {
      height:48px; background:var(--color-accent);
      display:flex; align-items:center; justify-content:space-between;
      padding:0 12px; position:relative; z-index:30;
    }
    .context-banner__title { font-size: var(--font-md); font-weight:600; color:#fff; letter-spacing:-0.3px }
    .context-banner__btn {
      width:32px; height:32px; border-radius:50%;
      background:rgba(255,255,255,0.15); border:none; cursor:pointer;
      display:flex; align-items:center; justify-content:center; transition:background 0.15s;
    }
    .context-banner__btn:hover { background:rgba(255,255,255,0.25) }

    /* ── 검색바 ── */
    .search-wrap { padding:10px 16px; background:#fff; position:relative; z-index:30; border-bottom:0.5px solid var(--color-border-light) }
    .search-inner { display:flex; align-items:center; gap:10px; background:var(--color-surface); border-radius:12px; padding:0 14px; height:44px }
    .search-inner input { flex:1; border:none; background:transparent; outline:none; font-family:var(--font-family); font-size: var(--font-md); color:#000 }
    .search-inner input::placeholder { color:rgba(0,0,0,0.25) }

    /* ── 지도 캔버스 ── */
    .map-canvas { position:absolute; top:158px; left:0; right:0; bottom:0; background:#e8e8ed }
    .map-canvas__grid { position:absolute; inset:0 }
    .map-canvas__grid line { stroke:rgba(0,0,0,0.04); stroke-width:0.5 }
    .map-canvas__road { position:absolute; inset:0 }
    .map-canvas__road path { fill:none; stroke:rgba(255,255,255,0.9); stroke-linecap:round }
    .map-canvas__road path.road-main { stroke-width:8 }
    .map-canvas__road path.road-sub { stroke-width:4; stroke:rgba(255,255,255,0.7) }
    .map-canvas__block { position:absolute; border-radius:4px; background:rgba(0,0,0,0.06) }

    /* ── 마커 (map.html 동일 구조) ── */
    .map-pin { position:absolute; transform:translate(-50%,-100%); cursor:pointer; transition:transform 0.15s; z-index:5 }
    .map-pin:active { transform:translate(-50%,-100%) scale(0.9) }
    .map-pin.is-active { z-index:6 }
    .map-pin.is-active svg path:first-child { filter:drop-shadow(0 3px 6px rgba(227,27,89,0.4)) }
    .map-pin__touch { position:absolute; inset:-10px; border-radius:50% }

    /* ── 현재 위치 (map.html 동일 구조) ── */
    .map-me { position:absolute; transform:translate(-50%,-50%); z-index:4 }
    .map-me__pulse { width:44px; height:44px; border-radius:50%; background:rgba(0,113,227,0.1); display:flex; align-items:center; justify-content:center; animation:pulse 2s infinite }
    .map-me__ring { width:24px; height:24px; border-radius:50%; background:rgba(0,113,227,0.15); display:flex; align-items:center; justify-content:center }
    .map-me__dot { width:12px; height:12px; border-radius:50%; background:#0071e3; border:2.5px solid #fff; box-shadow:0 1px 4px rgba(0,0,0,0.2) }
    @keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.3);opacity:0.6} }

    /* ── 지도 컨트롤 ── */
    .map-controls { position:absolute; right:16px; top:16px; z-index:10; display:flex; flex-direction:column; gap:8px }
    .map-ctrl-group { background:#fff; border-radius:12px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.1) }
    .map-ctrl { width:40px; height:40px; border:none; background:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:20px; color:rgba(0,0,0,0.45); transition:background 0.15s }
    .map-ctrl:hover { background:var(--color-surface) }
    .map-ctrl-divider { height:0.5px; background:rgba(0,0,0,0.06) }

    /* ── 스팟 미리보기 시트 ── */
    .preview-sheet {
      position:absolute; bottom:0; left:0; right:0;
      background:#fff; border-radius:20px 20px 0 0;
      padding:0 0 28px;
      transform:translateY(100%);
      transition:transform 0.28s cubic-bezier(0.32,0.72,0,1);
      z-index:20;
      box-shadow:0 -4px 20px rgba(0,0,0,0.1);
    }
    .preview-sheet.active { transform:translateY(0) }
    .preview-handle { display:flex; justify-content:center; padding:12px 0 8px }
    .preview-handle__bar { width:36px; height:5px; border-radius:2.5px; background:rgba(0,0,0,0.1) }
    .preview-body { padding:0 20px; background: #fff; }
    .preview-spot { display:flex; align-items:center; gap:14px; margin-bottom:var(--space-md) }
    .preview-thumb { width:60px; height:60px; border-radius:12px; flex-shrink:0 }
    .preview-thumb--1 { background:linear-gradient(to bottom,#232526,#8e7b5a) }
    .preview-thumb--2 { background:linear-gradient(to bottom,#0f2027,#2c5364) }
    .preview-thumb--3 { background:linear-gradient(to bottom,#0a1a0f,#4a8060) }
    .preview-thumb--4 { background:linear-gradient(to bottom,#1a0a2e,#7b4ea0) }
    .preview-info__name { font-size: var(--font-lg); font-weight:600; letter-spacing:-0.3px; margin-bottom:3px }
    .preview-info__sub  { font-size:12px; color:rgba(0,0,0,0.4); margin-bottom:6px }
    .preview-tags { display:flex; gap:6px; flex-wrap:wrap }
    .preview-tag { padding:2px 10px; border-radius:8px; font-size: var(--font-2xs); font-weight:500 }
    .preview-tag--pink { background:rgba(227,27,89,0.08); color:var(--color-accent) }
    .preview-tag--gray { background:rgba(0,0,0,0.05); color:rgba(0,0,0,0.4) }

    .btn-select {
      width:100%; height:52px; border-radius:26px;
      background:var(--color-accent); border:none; cursor:pointer;
      font-family:var(--font-family); font-size:16px; font-weight:500;
      color:#fff; letter-spacing:-0.2px; transition:background 0.15s;
    }
    .btn-select:hover { background:var(--color-accent-hover) }
    .btn-select:active { transform:scale(0.98) }

    /* ── 딤 ── */
    .map-dim {
      position:absolute; inset:0; background:rgba(0,0,0,0.25);
      opacity:0; pointer-events:none; transition:opacity 0.2s; z-index:10;
    }
    .map-dim.active { opacity:1; pointer-events:all }

</style>
</head>
<body>
<div class="phone-frame">

  <!-- 상태바 -->
  <div class="status-bar">
    <span class="status-bar__time">9:41</span>
    <div class="dynamic-island"></div>
    <div class="status-bar__right">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="rgba(0,0,0,0.8)"><rect x="0" y="9" width="3" height="3" rx=".75"/><rect x="4.5" y="6" width="3" height="6" rx=".75"/><rect x="9" y="3" width="3" height="9" rx=".75"/><rect x="13.5" y="0" width="3" height="12" rx=".75"/></svg>
      <svg width="27" height="12" viewBox="0 0 27 12"><rect x="0" y="0" width="24" height="12" rx="3" fill="none" stroke="rgba(0,0,0,0.3)" stroke-width="1"/><rect x="1.5" y="1.5" width="19" height="9" rx="1.5" fill="#34c759"/><rect x="25" y="3.5" width="2.5" height="5" rx="1" fill="rgba(0,0,0,0.25)"/></svg>
    </div>
  </div>

  <!-- 컨텍스트 배너 -->
  <div class="context-banner">
    <!-- 🔗 뒤로가기 → wishlist-setting.html -->
    <button class="context-banner__btn" id="btn-back" aria-label="뒤로가기">
      <svg width="16" height="16" viewBox="0 0 24 24" stroke="#fff"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M15 6l-6 6l6 6"/></svg>
    </button>
    <span class="context-banner__title">변경할 스팟을 선택하세요</span>
    <!-- 🔗 X 버튼 → 변경 취소 후 wishlist-setting.html 복귀 -->
    <button class="context-banner__btn" id="btn-cancel" aria-label="취소">
      <svg width="14" height="14" viewBox="0 0 24 24" stroke="#fff"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M18 6l-12 12"/><path d="M6 6l12 12"/></svg>
    </button>
  </div>

  <!-- 검색바 -->
  <div class="search-wrap">
    <div class="search-inner">
      <svg width="16" height="16" viewBox="0 0 24 24" stroke="rgba(0,0,0,0.22)"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M10 10m-7 0a7 7 0 1 0 14 0a7 7 0 1 0 -14 0"/><path d="M21 21l-6 -6"/></svg>
      <input type="text" id="search-input" placeholder="스팟 이름으로 검색">
    </div>
  </div>

  <!-- 지도 캔버스 -->
  <div class="map-canvas" id="map-area">
    <!-- 그리드 -->
    <svg class="map-canvas__grid" width="100%" height="100%">
      <line x1="0" y1="100" x2="100%" y2="100"/><line x1="0" y1="200" x2="100%" y2="200"/>
      <line x1="0" y1="300" x2="100%" y2="300"/><line x1="0" y1="400" x2="100%" y2="400"/>
      <line x1="0" y1="500" x2="100%" y2="500"/>
      <line x1="78" y1="0" x2="78" y2="100%"/><line x1="156" y1="0" x2="156" y2="100%"/>
      <line x1="234" y1="0" x2="234" y2="100%"/><line x1="312" y1="0" x2="312" y2="100%"/>
    </svg>
    <!-- 건물 블록 -->
    <div class="map-canvas__block" style="left:20px;top:30px;width:60px;height:40px"></div>
    <div class="map-canvas__block" style="left:90px;top:22px;width:50px;height:55px"></div>
    <div class="map-canvas__block" style="left:220px;top:36px;width:70px;height:35px"></div>
    <div class="map-canvas__block" style="left:310px;top:28px;width:55px;height:45px"></div>
    <div class="map-canvas__block" style="left:20px;top:180px;width:55px;height:42px"></div>
    <div class="map-canvas__block" style="left:90px;top:175px;width:65px;height:38px"></div>
    <div class="map-canvas__block" style="left:232px;top:182px;width:68px;height:40px"></div>
    <div class="map-canvas__block" style="left:315px;top:178px;width:56px;height:46px"></div>
    <div class="map-canvas__block" style="left:20px;top:300px;width:62px;height:44px"></div>
    <div class="map-canvas__block" style="left:95px;top:295px;width:50px;height:50px"></div>
    <div class="map-canvas__block" style="left:255px;top:302px;width:68px;height:38px"></div>
    <div class="map-canvas__block" style="left:312px;top:298px;width:58px;height:42px"></div>
    <!-- 도로 -->
    <svg class="map-canvas__road" width="100%" height="100%">
      <path class="road-main" d="M0 125Q80 115 195 122Q310 128 390 118"/>
      <path class="road-main" d="M0 245Q90 235 195 242Q300 248 390 238"/>
      <path class="road-main" d="M175 0Q168 120 175 245Q182 370 170 690"/>
      <path class="road-sub" d="M0 365Q88 355 195 362Q302 368 390 358"/>
      <path class="road-sub" d="M78 0Q72 120 78 365Q84 500 72 690"/>
      <path class="road-sub" d="M312 0Q306 120 312 365Q318 500 306 690"/>
    </svg>

    <!-- 마커들 (map.html 동일 구조, 핑크 핀) -->
    <div class="map-pin" id="pin-1" style="left:31%;top:30%" onclick="showPreview('1')">
      <div class="map-pin__touch"></div>
      <svg width="28" height="35" viewBox="0 0 24 30" fill="none" filter="drop-shadow(0 2px 4px rgba(0,0,0,0.2))">
        <path d="M12 0C5.4 0 0 5.4 0 12C0 20 12 30 12 30S24 20 24 12C24 5.4 18.6 0 12 0Z" fill="#E31B59"/>
        <circle cx="12" cy="10.5" r="4.5" fill="#fff"/>
      </svg>
    </div>
    <div class="map-pin" id="pin-2" style="left:66%;top:20%" onclick="showPreview('2')">
      <div class="map-pin__touch"></div>
      <svg width="28" height="35" viewBox="0 0 24 30" fill="none" filter="drop-shadow(0 2px 4px rgba(0,0,0,0.2))">
        <path d="M12 0C5.4 0 0 5.4 0 12C0 20 12 30 12 30S24 20 24 12C24 5.4 18.6 0 12 0Z" fill="#E31B59"/>
        <circle cx="12" cy="10.5" r="4.5" fill="#fff"/>
      </svg>
    </div>
    <div class="map-pin" id="pin-3" style="left:80%;top:52%" onclick="showPreview('3')">
      <div class="map-pin__touch"></div>
      <svg width="28" height="35" viewBox="0 0 24 30" fill="none" filter="drop-shadow(0 2px 4px rgba(0,0,0,0.2))">
        <path d="M12 0C5.4 0 0 5.4 0 12C0 20 12 30 12 30S24 20 24 12C24 5.4 18.6 0 12 0Z" fill="#E31B59"/>
        <circle cx="12" cy="10.5" r="4.5" fill="#fff"/>
      </svg>
    </div>
    <div class="map-pin" id="pin-4" style="left:18%;top:62%" onclick="showPreview('4')">
      <div class="map-pin__touch"></div>
      <svg width="28" height="35" viewBox="0 0 24 30" fill="none" filter="drop-shadow(0 2px 4px rgba(0,0,0,0.2))">
        <path d="M12 0C5.4 0 0 5.4 0 12C0 20 12 30 12 30S24 20 24 12C24 5.4 18.6 0 12 0Z" fill="#E31B59"/>
        <circle cx="12" cy="10.5" r="4.5" fill="#fff"/>
      </svg>
    </div>

    <!-- 현재 위치 (map.html 동일 구조) -->
    <div class="map-me" style="left:50%;top:48%">
      <div class="map-me__pulse">
        <div class="map-me__ring"><div class="map-me__dot"></div></div>
      </div>
    </div>

    <!-- 지도 컨트롤 -->
    <div class="map-controls">
      <div class="map-ctrl-group">
        <button class="map-ctrl">+</button>
        <div class="map-ctrl-divider"></div>
        <button class="map-ctrl">−</button>
      </div>
      <div class="map-ctrl-group">
        <button class="map-ctrl" aria-label="내 위치">
          <svg width="16" height="16" viewBox="0 0 24 24" stroke="rgba(0,0,0,.45)"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M12 12m-3 0a3 3 0 1 0 6 0a3 3 0 1 0 -6 0"/><path d="M12 2l0 3"/><path d="M12 19l0 3"/><path d="M2 12l3 0"/><path d="M19 12l3 0"/></svg>
        </button>
      </div>
    </div>

    <!-- 딤 -->
    <div class="map-dim" id="map-dim"></div>

    <!-- 스팟 미리보기 시트 -->
    <div class="preview-sheet" id="preview-sheet">
      <div class="preview-handle"><div class="preview-handle__bar"></div></div>
      <div class="preview-body">
        <div class="preview-spot">
          <div class="preview-thumb" id="preview-thumb"></div>
          <div class="preview-info">
            <p class="preview-info__name" id="preview-name">—</p>
            <p class="preview-info__sub"  id="preview-sub">—</p>
            <div class="preview-tags" id="preview-tags"></div>
          </div>
        </div>
        <button class="btn-select" id="btn-select">이 스팟으로 변경</button>
      </div>
    </div>
  </div><!-- /map-canvas -->

</div><!-- /phone-frame -->

<script>
  const spotData = {
    '1': { name:'경복궁 야간개장', sub:'서울 종로구', badge:'포토제닉 91', tags:['야경','한옥'], thumb:'1' },
    '2': { name:'남산타워 전망대',  sub:'서울 용산구', badge:'포토제닉 88', tags:['야경','도심'], thumb:'2' },
    '3': { name:'광안리 해수욕장', sub:'부산 수영구', badge:'포토제닉 87', tags:['해변','야경'], thumb:'3' },
    '4': { name:'창덕궁 후원',     sub:'서울 종로구', badge:'포토제닉 85', tags:['한옥','자연'], thumb:'4' },
  };

  let selectedSpot = null;
  let activePin = null;

  // 핀 클릭 → 미리보기 시트
  function showPreview(id) {
    const d = spotData[id];

    // 이전 active 핀 해제
    if (activePin) document.getElementById('pin-' + activePin)?.classList.remove('is-active');
    activePin = id;
    document.getElementById('pin-' + id)?.classList.add('is-active');

    selectedSpot = { id, ...d };

    document.getElementById('preview-name').textContent = d.name;
    document.getElementById('preview-sub').textContent  = d.sub;
    document.getElementById('preview-thumb').className  = `preview-thumb preview-thumb--${d.thumb}`;

    const tagsEl = document.getElementById('preview-tags');
    tagsEl.innerHTML = `<span class="preview-tag preview-tag--pink">${d.badge}</span>`
      + d.tags.map(t => `<span class="preview-tag preview-tag--gray">${t}</span>`).join('');

    document.getElementById('preview-sheet').classList.add('active');
    document.getElementById('map-dim').classList.add('active');
  }

  // 딤 클릭 → 시트 닫기
  document.getElementById('map-dim').addEventListener('click', closeSheet);
  function closeSheet() {
    document.getElementById('preview-sheet').classList.remove('active');
    document.getElementById('map-dim').classList.remove('active');
    if (activePin) document.getElementById('pin-' + activePin)?.classList.remove('is-active');
    activePin = null;
    selectedSpot = null;
  }

  // 이 스팟으로 변경 → wishlist-setting.html 복귀
  document.getElementById('btn-select').addEventListener('click', () => {
    if (!selectedSpot) return;
    const params = new URLSearchParams({
      spot_name:  selectedSpot.name,
      spot_sub:   selectedSpot.sub,
      spot_thumb: selectedSpot.thumb,
    });
    window.location.href = `../wishlist/wishlist-setting.html?${params.toString()}`;
  });

  // 뒤로가기 / 취소 → wishlist-setting.html
  document.getElementById('btn-back').addEventListener('click',   () => location.href = '../wishlist/wishlist-setting.html');
  document.getElementById('btn-cancel').addEventListener('click', () => location.href = '../wishlist/wishlist-setting.html');

  // 검색 → 해당 핀 하이라이트
  document.getElementById('search-input').addEventListener('input', function() {
    const q = this.value.trim().toLowerCase();
    Object.keys(spotData).forEach(id => {
      const pin = document.getElementById('pin-' + id);
      const match = !q || spotData[id].name.toLowerCase().includes(q);
      if (pin) pin.style.opacity = match ? '1' : '0.3';
    });
  });
</script>
</body>
</html>
