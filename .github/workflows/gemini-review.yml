name: Gemini Code Review

on:
  pull_request:
    branches:
      - main
      - develop
    types: [opened, synchronize, reopened]

jobs:
  review:
    name: Gemini Code Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gemini Code Review
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { execSync } = require('child_process');
            const base = context.payload.pull_request.base.sha;
            const head = context.payload.pull_request.head.sha;
            const diff = execSync(`git diff ${base} ${head}`, { maxBuffer: 10 * 1024 * 1024 }).toString().slice(0, 8000);
            console.log(`base: ${base}, head: ${head}`);
            console.log(`diff length: ${diff.length}`);

            if (!diff) {
              console.log('diff is empty, skipping review');
              return;
            }

            try {
              const response = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${{ secrets.GEMINI_API_KEY }}', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  contents: [{
                    parts: [{
                      text: `아래 코드 변경사항을 리뷰해줘. 버그, 잠재적 문제, 개선 포인트를 한국어로 설명해줘.\n\n${diff}`
                    }]
                  }]
                })
              });

              if (!response.ok) {
                throw new Error(`API Error: ${response.status} ${response.statusText}`);
              }

              const data = await response.json();
              const review = data.candidates?.[0]?.content?.parts?.[0]?.text;

              if (!review) {
                console.error('No review content received:', JSON.stringify(data));
                return;
              }

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: `## Gemini Code Review\n\n${review}`
              });
            } catch (error) {
              core.setFailed(`Gemini review failed: ${error.message}`);
            }
