name: Issue Labeler

on:
  issues:
    types: [opened, edited]

jobs:
  label:
    name: Auto Label Issue
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title || '';
            const labelMap = [
              { pattern: /^fix(\(.+\))?:/,      label: 'bug'      },
              { pattern: /^feat(\(.+\))?:/,     label: 'feature'  },
              { pattern: /^refactor(\(.+\))?:/, label: 'refactor' },
              { pattern: /^style(\(.+\))?:/,    label: 'style'    },
              { pattern: /^chore(\(.+\))?:/,    label: 'chore'    },
              { pattern: /^docs(\(.+\))?:/,     label: 'docs'     },
              { pattern: /^test(\(.+\))?:/,     label: 'test'     },
            ];

            const matched = labelMap.find(({ pattern }) => pattern.test(title));
            if (!matched) return;

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: [matched.label],
            });
