<svg width="390" height="844" viewBox="0 0 390 844" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Sen:wght@700;800&amp;display=swap');</style>
  </defs>

  <!-- Background -->
  <rect width="390" height="844" rx="40" fill="#ffffff"/>

  <!-- Status bar -->
  <text x="36" y="60" font-family="'SF Pro Text',system-ui,sans-serif" font-size="16" font-weight="600" fill="#000">9:41</text>
  <rect x="140" y="32" width="110" height="30" rx="15" fill="#000"/>
  <g transform="translate(310,46)" fill="#000">
    <rect x="0" y="6" width="3" height="2" rx=".5"/>
    <rect x="4.5" y="4" width="3" height="4" rx=".5"/>
    <rect x="9" y="2" width="3" height="6" rx=".5"/>
    <rect x="13.5" y="0" width="3" height="8" rx=".5"/>
  </g>
  <g transform="translate(356,44)">
    <rect x="0" y="0" width="24" height="12" rx="3" stroke="rgba(0,0,0,0.3)" stroke-width="1" fill="none"/>
    <rect x="1.5" y="1.5" width="19" height="9" rx="1.5" fill="#34c759"/>
    <rect x="25" y="3.5" width="2.5" height="5" rx="1" fill="rgba(0,0,0,0.3)"/>
  </g>

  <!-- 3D "PNG" — shadow: black / front: pink -->
  <g font-family="'Sen','Arial Black',Impact,sans-serif"
     font-size="132" font-weight="800"
     text-anchor="middle" dominant-baseline="auto">
    <text x="201" y="451" fill="#000000">PNG</text>
    <text x="195" y="445" fill="#E31B59">PNG</text>
  </g>

  <!-- "PIC N GO" -->
  <text x="195" y="498"
        text-anchor="middle"
        font-family="'Sen',system-ui,sans-serif"
        font-size="18" font-weight="700"
        letter-spacing="9"
        fill="#000000">PIC N GO</text>

  <!-- Loading bar -->
  <rect x="145" y="760" width="100" height="3" rx="1.5" fill="rgba(0,0,0,0.08)"/>
  <rect x="145" y="760" width="38"  height="3" rx="1.5" fill="#E31B59"/>

  <!-- Home indicator -->
  <rect x="145" y="820" width="100" height="5" rx="2.5" fill="rgba(0,0,0,0.12)"/>
